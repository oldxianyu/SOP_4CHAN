<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>四季蝉业务对接SOP</title>
    <link rel="stylesheet" href="vendor/antd-reset.css" />
    <style>
      :root {
        color: #1f2a24;
        background: #f4f7f3;
        font-synthesis: none;
        text-rendering: geometricPrecision;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(36, 120, 95, 0.09), transparent 360px),
          #f4f7f3;
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
      }

      .app-shell {
        width: min(1480px, calc(100% - 40px));
        margin: 0 auto;
        padding: 34px 0 48px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: flex-end;
        margin-bottom: 18px;
      }

      .app-header h1.ant-typography {
        margin: 4px 0 8px;
        color: #146c96;
        font-size: clamp(32px, 4vw, 52px);
        line-height: 1.06;
      }

      .brand-kicker {
        color: #218ec4;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .main-tabs > .ant-tabs-nav {
        margin-bottom: 22px;
      }

      .main-tabs .ant-tabs-tab {
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        padding: 14px 22px;
        font-size: 19px;
        font-weight: 800;
        line-height: 1.2;
      }

      .main-tabs .ant-tabs-tab + .ant-tabs-tab {
        margin-left: 12px;
      }

      .main-tabs .ant-tabs-tab-active {
        background: #e8f6ff;
        box-shadow: 0 8px 18px rgba(33, 142, 196, 0.14);
      }

      .main-tabs .ant-tabs-tab-btn {
        min-width: 82px;
        text-align: center;
      }

      .home-shell,
      .calendar-shell {
        animation: pageIn 320ms ease both;
      }

      .hero-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.72fr);
        gap: 28px;
        min-height: 470px;
        padding: 42px;
        overflow: hidden;
        border: 1px solid #dce2d9;
        border-radius: 8px;
        background:
          radial-gradient(circle at 92% 18%, rgba(73, 176, 224, 0.22), transparent 28%),
          linear-gradient(135deg, #ffffff 0%, #eef8ff 58%, #e5f4fb 100%);
        box-shadow: 0 18px 46px rgba(31, 42, 36, 0.1);
      }

      .hero-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .hero-copy h1.ant-typography {
        max-width: 820px;
        margin: 0;
        color: #105d86;
        font-size: clamp(30px, 4.1vw, 54px);
        line-height: 1.12;
      }

      .hero-lede.ant-typography {
        max-width: 820px;
        margin: 22px 0 26px;
        color: #46554b;
        font-size: 18px;
        line-height: 1.85;
      }

      .hero-board {
        align-self: center;
        padding: 20px;
        border: 1px solid rgba(36, 120, 95, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 20px 46px rgba(31, 42, 36, 0.08);
      }

      .board-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .hero-board .ant-statistic {
        min-height: 112px;
        padding: 16px;
        border-radius: 8px;
        background: #f7faf7;
      }

      .stakeholder-row {
        margin-top: 16px;
      }

      .stakeholder-card,
      .section-card,
      .table-card,
      .summary-row .ant-card {
        border: 1px solid #dce2d9;
        box-shadow: 0 14px 36px rgba(31, 42, 36, 0.08);
      }

      .stakeholder-card {
        height: 100%;
      }

      .card-icon,
      .module-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        color: #146c96;
        background: #e6f5fc;
        font-size: 18px;
        font-weight: 900;
      }

      .section-card {
        margin-top: 16px;
      }

      .section-title-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .section-title-row .ant-typography {
        max-width: 560px;
        margin: 4px 0 0;
        color: #657066;
        text-align: right;
      }

      .tall-card {
        height: 100%;
      }

      .module-card {
        height: 100%;
        background: #fbfcfa;
      }

      .module-card strong {
        display: block;
        margin-bottom: 6px;
        color: #146c96;
      }

      .calendar-shell .ant-alert,
      .summary-row {
        margin-bottom: 16px;
      }

      .table-card .ant-table-thead > tr > th {
        background: #eaf6fc !important;
        color: #24536b;
        font-weight: 900;
      }

      .project-name {
        color: #146c96;
      }

      .hero-platform-tag.ant-tag {
        width: fit-content;
        margin-bottom: 18px;
        padding: 9px 14px;
        border-radius: 999px;
        font-size: clamp(19px, 2.3vw, 30px);
        font-weight: 900;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .task-tag {
        max-width: 150px;
        margin-inline-end: 0;
        white-space: normal;
        line-height: 1.55;
      }

      .notes-block ul {
        margin: 6px 0 12px;
        padding-left: 18px;
      }

      .notes-block li + li {
        margin-top: 5px;
      }

      .download-list {
        width: 100%;
      }

      .download-list .ant-btn {
        justify-content: flex-start;
        height: auto;
        min-height: 38px;
        padding: 8px 10px;
        white-space: normal;
        text-align: left;
        line-height: 1.45;
      }

      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 960px) {
        .app-shell {
          width: min(100% - 24px, 1480px);
          padding-top: 24px;
        }

        .app-header,
        .section-title-row {
          display: block;
        }

        .hero-panel {
          grid-template-columns: 1fr;
          padding: 28px 20px;
        }

        .section-title-row .ant-typography {
          max-width: none;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/dayjs.min.js"></script>
    <script src="vendor/antd.min.js"></script>
    <script>
      const {
        Alert,
        Button,
        Card,
        Col,
        ConfigProvider,
        Row,
        Space,
        Statistic,
        Steps,
        Table,
        Tabs,
        Tag,
        Timeline,
        Typography,
      } = antd;
      const { Paragraph, Text, Title } = Typography;
      const h = React.createElement;

      function formatChineseDate(date) {
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      }

      function getDynamicDates() {
        const today = new Date();
        const endDate = new Date(today.getFullYear() + 1, today.getMonth(), today.getDate());
        endDate.setDate(endDate.getDate() - 1);
        return {
          todayText: formatChineseDate(today),
          rangeText: `${formatChineseDate(today)} - ${formatChineseDate(endDate)}`,
        };
      }

      const materials = {
        payment: [
          { label: "斗拱平台综合支付服务协议", href: "协议文件/02%20斗拱平台综合支付服务协议（四季蝉）20260113.docx" },
          { label: "药店与店员激励协议", href: "协议文件/03%20药店与店员激励协议.doc" },
        ],
        baseInfo: [
          { label: "门店地址批量更新模板", href: "协议文件/门店地址批量更新模板.xlsx" },
          { label: "员工账号批量更新模板", href: "协议文件/员工账号批量更新模板.xlsx" },
        ],
        industry: [
          { label: "四季蝉厂家&品种政策收集表", href: "协议文件/四季蝉厂家%26品种政策收集表.xlsx" },
        ],
      };

      function MaterialButtons({ items }) {
        if (!items || !items.length) return h(Text, { type: "secondary" }, "暂无");
        return h(
          Space,
          { direction: "vertical", size: 8, className: "download-list" },
          items.map((item) =>
            h(
              Button,
              { block: true, download: true, href: item.href, key: item.href },
              `下载：${item.label}`,
            ),
          ),
        );
      }

      function HomePage({ onOpenCalendar }) {
        const stakeholderCards = [
          ["连锁总部", "提升重点品、高毛利品动销，把活动过程、费用核算和执行结果集中管理。"],
          ["门店店员", "清楚知道今天重点卖什么、怎么卖、卖了能赚多少、奖励什么时候到账。"],
          ["工业厂家", "把市场费用真正打到门店执行层，用门店和员工数据判断活动投入效果。"],
          ["运营团队", "减少红包群、Excel对账和人工统计，形成活动上线、跟踪、复盘的标准动作。"],
        ];
        const painPoints = [
          ["重点品种管理难", "店员记不住重点品、政策、奖励算法和产品卖点。"],
          ["激励反馈不及时", "传统方式依赖月底工资、微信群红包和人工统计，奖励感知弱。"],
          ["总部统计慢", "销量、完成率、员工表现和费用核算依赖Excel，慢且容易错。"],
          ["厂家落地难", "厂家有费用和政策，却难以看到门店是否执行、哪里有效。"],
          ["培训销售脱节", "培训学完不等于卖出去，知识和销售结果没有形成闭环。"],
          ["过程管理靠人盯", "排行榜、重点提醒、大单分享、激励通知缺少自动化触达。"],
        ];
        const modules = [
          ["员工端小程序", "看活动、看收益、看排行榜、看培训内容、查产品卖点。"],
          ["活动配置", "支持单品突破、关联销售、黄金单品、任务品、培训奖励等活动。"],
          ["培训考试", "产品知识培训、题库考试、考试奖励与销售目标联动。"],
          ["AI机器人/社群运营", "自动推送排行榜、重点通知、大单分享、激励提醒和产品问答。"],
          ["数据看板", "总部、门店、厂家查看活动销量、执行情况、员工表现和费用使用。"],
          ["资金与提现", "奖励可实时到账/提现，资金在连锁账户中流转，流程更可控。"],
        ];

        return h(
          "div",
          { className: "home-shell" },
          h(
            "section",
            { className: "hero-panel" },
            h(
              "div",
              { className: "hero-copy" },
              h(Tag, { color: "blue", className: "hero-platform-tag" }, "医药连锁重点品种数字化动销平台"),
              h(Title, { level: 1 }, "把厂家资源、重点品培训、店员激励和销售数据打通"),
              h(
                Paragraph,
                { className: "hero-lede" },
                "四季蝉不是单纯的培训工具，也不是单纯的提成/红包工具。它围绕重点品、高毛利品、任务品，打通选品、培训、激励、销售、提现、统计和复盘，让动销动作被看见、被执行、被结算。",
              ),
              h(
                Space,
                { size: 12, wrap: true },
                h(Button, { type: "primary", size: "large", onClick: onOpenCalendar }, "查看对接行事历"),
                h(Button, { size: "large" }, "重点品动销闭环"),
              ),
            ),
            h(
              "div",
              { className: "hero-board" },
              h("div", { className: "board-header" }, h(Text, { strong: true }, "今日运营看板"), h(Tag, { color: "cyan" }, "SOP READY")),
              h(
                Row,
                { gutter: [12, 12] },
                ["重点品任务:选品", "店员激励:实时", "销售归因:自动", "活动复盘:可视"].map((item) => {
                  const [title, value] = item.split(":");
                  return h(Col, { span: 12, key: item }, h(Statistic, { title, value }));
                }),
              ),
            ),
          ),
          h(
            Row,
            { gutter: [16, 16], className: "stakeholder-row" },
            stakeholderCards.map(([title, text], index) =>
              h(
                Col,
                { xs: 24, md: 12, xl: 6, key: title },
                h(
                  Card,
                  { className: "stakeholder-card", bordered: false },
                  h("div", { className: "card-icon" }, String(index + 1).padStart(2, "0")),
                  h(Title, { level: 4 }, title),
                  h(Paragraph, null, text),
                ),
              ),
            ),
          ),
          h(
            Card,
            { className: "section-card", bordered: false },
            h(
              "div",
              { className: "section-title-row" },
              h(Title, { level: 2 }, "一条可结算的动销闭环"),
              h(Paragraph, null, "把“卖重点品”变成店员可感知、总部可追踪、厂家可复盘的运营动作。"),
            ),
            h(Steps, {
              current: 5,
              responsive: true,
              items: [
                { title: "配置活动", description: "重点品、任务政策、培训内容和激励规则" },
                { title: "店员学习", description: "小程序查看卖点、培训、考试和奖励" },
                { title: "门店销售", description: "系统基于销售数据自动归因" },
                { title: "奖励计算", description: "形成及时豆或延时豆" },
                { title: "收益提现", description: "满足规则后可提现到账" },
                { title: "看板复盘", description: "查看销量、完成率、表现和费用" },
              ],
            }),
          ),
          h(
            Row,
            { gutter: [16, 16] },
            h(
              Col,
              { xs: 24, lg: 11 },
              h(
                Card,
                { className: "section-card tall-card", bordered: false },
                h(Title, { level: 2 }, "主要解决的痛点"),
                h(Timeline, {
                  items: painPoints.map(([title, children]) => ({
                    color: "blue",
                    children: h("div", null, h(Text, { strong: true }, title), h(Paragraph, null, children)),
                  })),
                }),
              ),
            ),
            h(
              Col,
              { xs: 24, lg: 13 },
              h(
                Card,
                { className: "section-card tall-card", bordered: false },
                h(Title, { level: 2 }, "核心能力模块"),
                h(
                  Row,
                  { gutter: [12, 12] },
                  modules.map(([title, text], index) =>
                    h(
                      Col,
                      { xs: 24, md: 12, key: title },
                      h(
                        Card,
                        { className: "module-card", size: "small" },
                        h(Space, { align: "start" }, h("span", { className: "module-icon" }, index + 1), h("div", null, h(Text, { strong: true }, title), h(Paragraph, null, text))),
                      ),
                    ),
                  ),
                ),
              ),
            ),
          ),
        );
      }

      function CalendarPage({ dates }) {
        const rows = [
          {
            key: 1,
            index: 1,
            project: "汇付账户开通",
            property: "一次性",
            propertyColor: "gold",
            content: "填写两份协议，用于申请开通汇付账户。",
            tasks: ["《汇付-斗拱平台综合支付协议》", "《药店与店员激励协议》"],
            notes: h(
              "div",
              { className: "notes-block" },
              h(Text, { strong: true }, "斗拱平台协议："),
              h("ul", null, h("li", null, "02斗拱平台协议：打印两份。"), h("li", null, `第三页合同日期：${dates.rangeText}。`), h("li", null, `盖章、签字，日期手写为${dates.todayText}。`), h("li", null, "额外侧面加盖骑缝章，最后扫描成A4大小的PDF文件。")),
              h(Text, { strong: true }, "药店与店员激励协议："),
              h("ul", null, h("li", null, "03药店与店员激励协议：打印一份。"), h("li", null, `签字、盖章，乙方按手印，日期手写为${dates.todayText}。`), h("li", null, "最后扫描成A4大小的PDF文件。")),
              h(Paragraph, null, "按文档说明操作。法人和联系人身份证可以直接上传身份证原件；如使用复印件，需要盖公章。"),
            ),
            materialItems: materials.payment,
            people: ["财务", "信息"],
          },
          { key: 2, index: 2, project: "基础信息维护", property: "一次性", propertyColor: "gold", content: "维护员工信息、门店信息。", tasks: ["Excel表格维护至新零售后台。"], notes: "暂无", materialItems: materials.baseInfo, people: ["信息"] },
          { key: 3, index: 3, project: "工业信息收集", property: "及时更新", propertyColor: "cyan", content: "收集厂家信息，开通厂家账号，用于充值及建活动。", tasks: ["按模板填写《四季蝉供应商信息收集表》。"], notes: "暂无", materialItems: materials.industry, people: ["运营", "采购"] },
          { key: 4, index: 4, project: "活动商品创建", property: "每月更新", propertyColor: "cyan", content: "确认活动品种和活动政策。", tasks: ["按模板填写《品种政策收集模板表》。"], notes: "暂无", materialItems: [], people: ["运营", "采购"] },
          { key: 5, index: 5, project: "操作培训", property: "一次性", propertyColor: "gold", content: "连锁培训。", tasks: ["参与在线会议。"], notes: "暂无", materialItems: [], people: ["运营", "采购", "财务", "信息"] },
          { key: 6, index: 6, project: "订单测试", property: "一次性", propertyColor: "gold", content: "完成正向、逆向订单的奖励生成收回测试。", tasks: ["零售测试。"], notes: "暂无", materialItems: [], people: ["信息"] },
          { key: 7, index: 7, project: "店员培训上线", property: "一次性", propertyColor: "gold", content: "员工手机端培训：登录、认证；如何确认销售与奖励获得情况。", tasks: ["发送视频操作说明，可给店员集中线上培训。"], notes: "暂无", materialItems: [], people: ["店员"] },
        ];

        const columns = [
          { title: "序号", dataIndex: "index", width: 64, fixed: "left", align: "center", render: (value) => h(Text, { strong: true }, value) },
          { title: "项目", dataIndex: "project", width: 140, fixed: "left", render: (value) => h(Text, { strong: true, className: "project-name" }, value) },
          { title: "工作属性", dataIndex: "property", width: 112, render: (value, row) => h(Tag, { color: row.propertyColor }, value) },
          { title: "对接内容", dataIndex: "content", width: 190 },
          {
            title: "处理事务",
            dataIndex: "tasks",
            width: 180,
            render: (tasks) => h(Space, { direction: "vertical", size: 8 }, tasks.map((task) => h(Tag, { className: "task-tag", key: task }, task))),
          },
          { title: "注意事项", dataIndex: "notes", width: 360, render: (notes) => (notes === "暂无" ? h(Text, { type: "secondary" }, "暂无") : notes) },
          { title: "材料下载", dataIndex: "materialItems", width: 230, render: (items) => h(MaterialButtons, { items }) },
          {
            title: "连锁配合人员（建议）",
            dataIndex: "people",
            width: 180,
            render: (people) => h(Space, { wrap: true }, people.map((person) => h(Tag, { color: "blue", key: person }, person))),
          },
        ];

        return h(
          "div",
          { className: "calendar-shell" },
          h(Alert, { showIcon: true, type: "success", message: "对接行事历", description: "海典指导，连锁配合。材料下载列中的文件可直接提供给客户使用。" }),
          h(
            Row,
            { gutter: [16, 16], className: "summary-row" },
            [["总事项", 7], ["一次性工作", 5], ["每月更新", 1], ["及时更新", 1]].map(([title, value]) => h(Col, { xs: 12, md: 6, key: title }, h(Card, { bordered: false }, h(Statistic, { title, value })))),
          ),
          h(Card, { bordered: false, className: "table-card" }, h(Table, { columns, dataSource: rows, pagination: false, scroll: { x: 1500 }, sticky: true })),
        );
      }

      function App() {
        const [activeKey, setActiveKey] = React.useState("home");
        const dates = React.useMemo(getDynamicDates, []);
        return h(
          ConfigProvider,
          {
            theme: {
              token: {
                colorPrimary: "#218ec4",
                borderRadius: 8,
                colorInfo: "#1976ad",
                fontFamily: '"Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif',
              },
            },
          },
          h(
            "main",
            { className: "app-shell" },
