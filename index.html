<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海典四季蝉</title>
    <link rel="stylesheet" href="vendor/antd-reset.css" />
    <style>
      :root {
        color: #1f2a24;
        background: #f4f7f3;
        font-synthesis: none;
        text-rendering: geometricPrecision;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          radial-gradient(circle at 18% 8%, rgba(47, 77, 255, 0.14), transparent 28%),
          radial-gradient(circle at 78% 2%, rgba(255, 122, 61, 0.12), transparent 24%),
          linear-gradient(180deg, #f5f7ff 0%, #fafbff 48%, #f8fafc 100%);
        font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      .app-shell {
        width: min(1480px, calc(100% - 40px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: flex-end;
        margin-bottom: 18px;
        padding: 18px;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(239, 242, 255, 0.82));
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.08);
        backdrop-filter: blur(10px);
      }

      .brand-lockup {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .brand-logo {
        width: clamp(58px, 6.4vw, 78px);
        height: clamp(58px, 6.4vw, 78px);
        padding: 9px;
        border: 1px solid rgba(42, 75, 255, 0.2);
        border-radius: 24px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(238, 242, 255, 0.88));
        object-fit: contain;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 12px 28px rgba(24, 52, 126, 0.12);
      }

      .brand-kicker {
        display: block;
        max-width: 760px;
        margin-bottom: 2px;
        color: #64748b;
        font-size: clamp(14px, 1.6vw, 18px);
        font-weight: 650;
        line-height: 1.35;
      }

      .brand-copy h1.ant-typography {
        margin-top: 0;
      }

      .app-header h1.ant-typography {
        margin: 4px 0 8px;
        color: #1f3f95;
        font-size: clamp(30px, 3.8vw, 48px);
        line-height: 1.06;
      }

      .main-tabs > .ant-tabs-nav {
        margin-bottom: 18px;
        padding: 8px;
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        box-shadow: 0 12px 30px rgba(24, 52, 126, 0.06);
      }

      .main-tabs .ant-tabs-tab {
        border-radius: 8px;
        background: transparent;
        padding: 14px 22px;
        font-size: 19px;
        font-weight: 800;
        line-height: 1.2;
      }

      .main-tabs .ant-tabs-tab + .ant-tabs-tab {
        margin-left: 12px;
      }

      .main-tabs .ant-tabs-tab-active {
        background: linear-gradient(135deg, #eef2ff, #ffffff);
        box-shadow: 0 8px 18px rgba(42, 75, 255, 0.12);
      }

      .main-tabs .ant-tabs-tab-btn {
        min-width: 82px;
        text-align: center;
      }

      .home-shell,
      .calendar-shell {
        animation: pageIn 320ms ease both;
      }

      .hero-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.72fr);
        gap: 28px;
        min-height: 470px;
        padding: 42px;
        overflow: hidden;
        border: 1px solid rgba(42, 75, 255, 0.18);
        border-radius: 8px;
        background:
          radial-gradient(circle at 92% 18%, rgba(42, 75, 255, 0.18), transparent 28%),
          radial-gradient(circle at 12% 76%, rgba(255, 122, 61, 0.12), transparent 30%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(241, 244, 255, 0.92) 58%, rgba(235, 239, 255, 0.9) 100%);
        box-shadow: 0 22px 56px rgba(24, 52, 126, 0.1);
      }

      .hero-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .hero-copy h1.ant-typography {
        max-width: 820px;
        margin: 0;
        color: #1f3f95;
        font-size: clamp(30px, 4.1vw, 54px);
        line-height: 1.12;
      }

      .hero-lede.ant-typography {
        max-width: 820px;
        margin: 22px 0 26px;
        color: #46554b;
        font-size: 18px;
        line-height: 1.85;
      }

      .hero-board {
        align-self: center;
        padding: 20px;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78), 0 20px 46px rgba(24, 52, 126, 0.09);
        backdrop-filter: blur(12px);
      }

      .board-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .hero-board .ant-statistic {
        min-height: 112px;
        padding: 16px;
        border-radius: 8px;
        background: linear-gradient(180deg, #fbfcff, #f0f3ff);
      }

      .stakeholder-row {
        margin-top: 16px;
      }

      .stakeholder-card,
      .section-card,
      .table-card,
      .summary-row .ant-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 36px rgba(24, 52, 126, 0.07);
      }

      .stakeholder-card {
        height: 100%;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .stakeholder-card:hover,
      .module-card:hover,
      .play-card:hover {
        border-color: rgba(42, 75, 255, 0.26);
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.1);
        transform: translateY(-2px);
      }

      .card-icon,
      .module-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        color: #1f3f95;
        background: linear-gradient(135deg, #eef2ff, #fff7f1);
        font-size: 18px;
        font-weight: 900;
      }

      .section-card {
        margin-top: 16px;
      }

      .section-title-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .section-title-row .ant-typography {
        max-width: 560px;
        margin: 4px 0 0;
        color: #657066;
        text-align: right;
      }

      .tall-card {
        height: 100%;
      }

      .module-card {
        height: 100%;
        border-color: rgba(42, 75, 255, 0.14);
        background: #fbfcff;
      }

      .module-card strong {
        display: block;
        margin-bottom: 6px;
        color: #1f3f95;
      }

      .calendar-shell .ant-alert,
      .summary-row {
        margin-bottom: 16px;
      }

      .calendar-shell .ant-alert {
        border-color: rgba(42, 75, 255, 0.16);
        background: linear-gradient(135deg, #f6f8ff, #ffffff);
      }

      .table-card .ant-table-thead > tr > th {
        background: #eef2ff !important;
        color: #253f7c;
        font-weight: 900;
      }

      .project-name {
        color: #1f3f95;
      }

      .hero-platform-tag.ant-tag {
        width: fit-content;
        margin-bottom: 18px;
        padding: 9px 14px;
        border-radius: 999px;
        font-size: clamp(19px, 2.3vw, 30px);
        font-weight: 900;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .task-tag {
        max-width: 150px;
        margin-inline-end: 0;
        white-space: normal;
        padding: 5px 9px;
        font-size: 14px;
        line-height: 1.55;
      }

      .work-tag.ant-tag,
      .people-tag.ant-tag {
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.35;
      }

      .people-tag.ant-tag {
        margin-inline-end: 0;
      }

      .notes-block ul {
        margin: 6px 0 12px;
        padding-left: 18px;
      }

      .notes-block li + li {
        margin-top: 5px;
      }

      .download-list {
        width: 100%;
      }

      .download-list .ant-btn {
        justify-content: flex-start;
        height: auto;
        min-height: 38px;
        padding: 8px 10px;
        white-space: normal;
        text-align: left;
        line-height: 1.45;
        border-color: rgba(42, 75, 255, 0.16);
        background: #fbfcff;
      }

      .ant-btn-primary {
        box-shadow: 0 10px 22px rgba(42, 75, 255, 0.16);
      }

      .incentive-shell {
        animation: pageIn 320ms ease both;
      }

      .incentive-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 18px;
        align-items: stretch;
        margin-bottom: 16px;
      }

      .incentive-hero .ant-card {
        height: 100%;
        border: 1px solid rgba(42, 75, 255, 0.15);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 14px 36px rgba(24, 52, 126, 0.07);
      }

      .incentive-title.ant-typography {
        margin: 0 0 12px;
        color: #1f3f95;
        font-size: clamp(30px, 4vw, 52px);
        line-height: 1.1;
      }

      .incentive-lede.ant-typography {
        max-width: 900px;
        color: #46554b;
        font-size: 17px;
        line-height: 1.75;
      }

      .mode-card {
        height: 100%;
        border: 1px solid rgba(42, 75, 255, 0.14);
        background: linear-gradient(180deg, #fbfcff, #f0f3ff);
      }

      .play-card {
        height: 100%;
        border: 1px solid rgba(42, 75, 255, 0.14);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 12px 28px rgba(24, 52, 126, 0.07);
      }

      .play-card .ant-card-head-title {
        color: #1f3f95;
        font-weight: 900;
      }

      .play-card .ant-typography {
        margin-bottom: 0;
      }

      .play-meta {
        margin-top: 12px;
      }

      .position-card {
        height: 100%;
        border: 1px solid rgba(42, 75, 255, 0.14);
        background: linear-gradient(180deg, #fbfcff, #fff7f1);
      }

      .position-card strong {
        display: block;
        margin-bottom: 8px;
        color: #1f3f95;
      }

      .incentive-table .ant-table-thead > tr > th {
        background: #eef2ff !important;
        color: #253f7c;
        font-weight: 900;
      }

      .selection-shell {
        animation: pageIn 320ms ease both;
      }

      .selection-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 18px;
        margin-bottom: 16px;
      }

      .selection-hero .ant-card,
      .selection-level-card,
      .selection-source-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 14px 34px rgba(24, 52, 126, 0.07);
      }

      .selection-title.ant-typography {
        margin: 0 0 12px;
        color: #1f3f95;
        font-size: clamp(30px, 4vw, 52px);
        line-height: 1.1;
      }

      .selection-level-card {
        height: 100%;
        overflow: hidden;
      }

      .level-card-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        margin-bottom: 14px;
      }

      .level-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        color: #ffffff;
        background: linear-gradient(135deg, #2a4bff, #1f3f95);
        font-size: 22px;
        font-weight: 900;
      }

      .level-stars {
        color: #ff7438;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 2px;
      }

      .level-meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .level-meta {
        min-height: 74px;
        padding: 12px;
        border-radius: 8px;
        background: #f6f8ff;
      }

      .level-meta label {
        display: block;
        margin-bottom: 6px;
        color: #64748b;
        font-size: 13px;
      }

      .selection-source-card {
        height: 100%;
      }

      .source-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        margin-bottom: 12px;
        border-radius: 11px;
        color: #1f3f95;
        background: #eef2ff;
        font-weight: 900;
      }

      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 960px) {
        .app-shell {
          width: min(100% - 24px, 1480px);
          padding-top: 24px;
        }

        .app-header,
        .section-title-row {
          display: block;
        }

        .brand-lockup {
          align-items: flex-start;
        }

        .hero-panel {
          grid-template-columns: 1fr;
          padding: 28px 20px;
        }

        .incentive-hero {
          grid-template-columns: 1fr;
        }

        .selection-hero {
          grid-template-columns: 1fr;
        }

        .section-title-row .ant-typography {
          max-width: none;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/dayjs.min.js"></script>
    <script src="vendor/antd.min.js"></script>
    <script>
      const {
        Alert,
        Button,
        Card,
        Col,
        ConfigProvider,
        Row,
        Space,
        Statistic,
        Steps,
        Table,
        Tabs,
        Tag,
        Timeline,
        Typography,
      } = antd;
      const { Paragraph, Text, Title } = Typography;
      const h = React.createElement;

      function formatChineseDate(date) {
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      }

      function getDynamicDates() {
        const today = new Date();
        const endDate = new Date(today.getFullYear() + 1, today.getMonth(), today.getDate());
        endDate.setDate(endDate.getDate() - 1);
        return {
          todayText: formatChineseDate(today),
          rangeText: `${formatChineseDate(today)} - ${formatChineseDate(endDate)}`,
        };
      }

      const materials = {
        payment: [
          { label: "斗拱平台综合支付服务协议", href: "协议文件/02%20斗拱平台综合支付服务协议（四季蝉）20260113.docx" },
          { label: "药店与店员激励协议", href: "协议文件/03%20药店与店员激励协议.doc" },
        ],
        baseInfo: [
          { label: "门店地址批量更新模板", href: "协议文件/门店地址批量更新模板.xlsx" },
          { label: "员工账号批量更新模板", href: "协议文件/员工账号批量更新模板.xlsx" },
        ],
        industry: [
          { label: "四季蝉厂家&品种政策收集表", href: "协议文件/四季蝉厂家%26品种政策收集表.xlsx" },
        ],
      };

      function MaterialButtons({ items }) {
        if (!items || !items.length) return h(Text, { type: "secondary" }, "暂无");
        return h(
          Space,
          { direction: "vertical", size: 8, className: "download-list" },
          items.map((item) =>
            h(
              Button,
              { block: true, download: true, href: item.href, key: item.href },
              `下载：${item.label}`,
            ),
          ),
        );
      }

      function HomePage({ onOpenCalendar }) {
        const stakeholderCards = [
          ["连锁总部", "提升重点品、高毛利品动销，把活动过程、费用核算和执行结果集中管理。"],
          ["门店店员", "清楚知道今天重点卖什么、怎么卖、卖了能赚多少、奖励什么时候到账。"],
          ["工业厂家", "把市场费用真正打到门店执行层，用门店和员工数据判断活动投入效果。"],
          ["运营团队", "减少红包群、Excel对账和人工统计，形成活动上线、跟踪、复盘的标准动作。"],
        ];
        const painPoints = [
          ["重点品种管理难", "店员记不住重点品、政策、奖励算法和产品卖点。"],
          ["激励反馈不及时", "传统方式依赖月底工资、微信群红包和人工统计，奖励感知弱。"],
          ["总部统计慢", "销量、完成率、员工表现和费用核算依赖Excel，慢且容易错。"],
          ["厂家落地难", "厂家有费用和政策，却难以看到门店是否执行、哪里有效。"],
          ["培训销售脱节", "培训学完不等于卖出去，知识和销售结果没有形成闭环。"],
          ["过程管理靠人盯", "排行榜、重点提醒、大单分享、激励通知缺少自动化触达。"],
        ];
        const modules = [
          ["员工端小程序", "看活动、看收益、看排行榜、看培训内容、查产品卖点。"],
          ["活动配置", "支持单品突破、关联销售、黄金单品、任务品、培训奖励等活动。"],
          ["培训考试", "产品知识培训、题库考试、考试奖励与销售目标联动。"],
          ["AI机器人/社群运营", "自动推送排行榜、重点通知、大单分享、激励提醒和产品问答。"],
          ["数据看板", "总部、门店、厂家查看活动销量、执行情况、员工表现和费用使用。"],
          ["资金与提现", "奖励可实时到账/提现，资金在连锁账户中流转，流程更可控。"],
        ];

        return h(
          "div",
          { className: "home-shell" },
          h(
            "section",
            { className: "hero-panel" },
            h(
              "div",
              { className: "hero-copy" },
              h(Tag, { color: "blue", className: "hero-platform-tag" }, "医药连锁重点品种数字化动销平台"),
              h(Title, { level: 1 }, "把厂家资源、重点品培训、店员激励和销售数据打通"),
              h(
                Paragraph,
                { className: "hero-lede" },
                "四季蝉不是单纯的培训工具，也不是单纯的提成/红包工具。它围绕重点品、高毛利品、任务品，打通选品、培训、激励、销售、提现、统计和复盘，让动销动作被看见、被执行、被结算。",
              ),
              h(
                Space,
                { size: 12, wrap: true },
                h(Button, { type: "primary", size: "large", onClick: onOpenCalendar }, "查看对接行事历"),
                h(Button, { size: "large" }, "重点品动销闭环"),
              ),
            ),
            h(
              "div",
              { className: "hero-board" },
              h("div", { className: "board-header" }, h(Text, { strong: true }, "今日运营看板"), h(Tag, { color: "cyan" }, "SOP READY")),
              h(
                Row,
                { gutter: [12, 12] },
                ["重点品任务:选品", "店员激励:实时", "销售归因:自动", "活动复盘:可视"].map((item) => {
                  const [title, value] = item.split(":");
                  return h(Col, { span: 12, key: item }, h(Statistic, { title, value }));
                }),
              ),
            ),
          ),
          h(
            Row,
            { gutter: [16, 16], className: "stakeholder-row" },
            stakeholderCards.map(([title, text], index) =>
              h(
                Col,
                { xs: 24, md: 12, xl: 6, key: title },
                h(
                  Card,
                  { className: "stakeholder-card", bordered: false },
                  h("div", { className: "card-icon" }, String(index + 1).padStart(2, "0")),
                  h(Title, { level: 4 }, title),
                  h(Paragraph, null, text),
                ),
              ),
            ),
          ),
          h(
            Card,
            { className: "section-card", bordered: false },
            h(
              "div",
              { className: "section-title-row" },
              h(Title, { level: 2 }, "一条可结算的动销闭环"),
              h(Paragraph, null, "把“卖重点品”变成店员可感知、总部可追踪、厂家可复盘的运营动作。"),
            ),
            h(Steps, {
              current: 5,
              responsive: true,
              items: [
                { title: "配置活动", description: "重点品、任务政策、培训内容和激励规则" },
                { title: "店员学习", description: "小程序查看卖点、培训、考试和奖励" },
                { title: "门店销售", description: "系统基于销售数据自动归因" },
                { title: "奖励计算", description: "形成及时豆或延时豆" },
                { title: "收益提现", description: "满足规则后可提现到账" },
                { title: "看板复盘", description: "查看销量、完成率、表现和费用" },
              ],
            }),
