<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海典四季蝉SOP</title>
    <link rel="icon" type="image/png" href="assets/四季蝉.png" />
    <link rel="apple-touch-icon" href="assets/四季蝉.png" />
    <link rel="stylesheet" href="vendor/antd-reset.css" />
    <style>
      :root {
        color: #1f2a24;
        background: #f4f7f3;
        font-synthesis: none;
        text-rendering: geometricPrecision;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          radial-gradient(circle at 18% 8%, rgba(47, 77, 255, 0.14), transparent 28%),
          radial-gradient(circle at 78% 2%, rgba(255, 122, 61, 0.12), transparent 24%),
          linear-gradient(180deg, #f5f7ff 0%, #fafbff 48%, #f8fafc 100%);
        font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      .app-shell {
        width: min(1480px, calc(100% - 40px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-end;
        margin-bottom: 14px;
        padding: 14px 16px;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(239, 242, 255, 0.82));
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.08);
        backdrop-filter: blur(10px);
      }

      .brand-lockup {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .brand-logo {
        width: clamp(50px, 5.4vw, 68px);
        height: clamp(50px, 5.4vw, 68px);
        padding: 8px;
        border: 1px solid rgba(42, 75, 255, 0.18);
        border-radius: 20px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(238, 242, 255, 0.88));
        object-fit: contain;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 12px 28px rgba(24, 52, 126, 0.12);
      }

      .brand-kicker {
        display: block;
        max-width: 760px;
        margin-bottom: 2px;
        color: #64748b;
        font-size: clamp(14px, 1.6vw, 18px);
        font-weight: 650;
        line-height: 1.35;
      }

      .brand-copy h1.ant-typography {
        margin-top: 0;
      }

      .app-header h1.ant-typography {
        margin: 2px 0 4px;
        color: #1f3f95;
        font-size: clamp(28px, 3.2vw, 42px);
        line-height: 1.06;
      }

      .user-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
      }

      .auth-shell,
      .history-shell {
        animation: pageIn 320ms ease both;
      }

      .auth-route-shell {
        width: 100%;
        min-height: 100vh;
        padding: 0;
      }

      .auth-shell {
        min-height: min(760px, calc(100vh - 178px));
        display: grid;
        grid-template-columns: minmax(440px, 1.02fr) minmax(360px, 0.74fr);
        overflow: hidden;
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 28px;
        background:
          radial-gradient(circle at 18% 18%, rgba(108, 63, 245, 0.13), transparent 28%),
          radial-gradient(circle at 88% 18%, rgba(255, 155, 107, 0.13), transparent 25%),
          linear-gradient(135deg, #f8faff 0%, #eef3ff 54%, #fff8f1 100%);
        box-shadow: 0 34px 90px rgba(24, 52, 126, 0.14);
      }

      .auth-route-shell .auth-shell {
        width: 100%;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        grid-template-columns: minmax(610px, 1fr) minmax(460px, 0.74fr);
      }

      .auth-scene {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 100%;
        padding: 38px 42px;
        overflow: hidden;
        color: #ffffff;
        background:
          radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.22), transparent 25%),
          radial-gradient(circle at 14% 78%, rgba(255, 214, 128, 0.2), transparent 30%),
          linear-gradient(145deg, #3145a8 0%, #26347f 58%, #171f4c 100%);
      }

      .auth-scene::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.35) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.35) 1px, transparent 1px);
        background-size: 22px 22px;
      }

      .auth-scene-copy,
      .auth-stage,
      .auth-scene-foot {
        position: relative;
        z-index: 1;
      }

      .auth-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        font-weight: 850;
        letter-spacing: 0;
      }

      .auth-brand img {
        width: 42px;
        height: 42px;
        padding: 6px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
      }

      .auth-scene-copy h2.ant-typography {
        max-width: 560px;
        margin: 0;
        color: #ffffff;
        font-size: clamp(32px, 3.2vw, 50px);
        line-height: 1.08;
      }

      .auth-scene-copy .ant-typography {
        max-width: 560px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 17px;
        line-height: 1.8;
      }

      .auth-stage {
        position: relative;
        display: grid;
        place-items: end center;
        height: 430px;
        margin: 8px 0 14px;
      }

      .character-floor {
        position: absolute;
        left: 8%;
        right: 8%;
        bottom: 12px;
        height: 50px;
        border-radius: 999px;
        background: radial-gradient(ellipse, rgba(3, 12, 42, 0.42), transparent 68%);
        filter: blur(3px);
      }

      .ref-characters {
        position: relative;
        width: min(560px, 100%);
        height: 400px;
        transform: translateY(4px);
      }

      .ref-character {
        position: absolute;
        bottom: 0;
        transition:
          height 680ms cubic-bezier(0.2, 0.8, 0.2, 1),
          left 680ms cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 680ms cubic-bezier(0.2, 0.8, 0.2, 1);
        transform-origin: bottom center;
        box-shadow: 0 24px 42px rgba(0, 0, 0, 0.18);
      }

      .ref-character.purple {
        left: 70px;
        z-index: 1;
        width: 180px;
        height: 400px;
        border-radius: 10px 10px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.12), transparent 24%),
          #6c3ff5;
        transform: skewX(var(--purple-skew, 0deg));
      }

      .ref-character.black {
        left: 240px;
        z-index: 2;
        width: 120px;
        height: 310px;
        border-radius: 8px 8px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.06), transparent 24%),
          #2d2d2d;
        transform: skewX(var(--black-skew, 0deg));
      }

      .ref-character.orange {
        left: 0;
        z-index: 3;
        width: 240px;
        height: 200px;
        border-radius: 120px 120px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.18), transparent 30%),
          #ff9b6b;
        transform: skewX(var(--orange-skew, 0deg));
      }

      .ref-character.yellow {
        left: 310px;
        z-index: 4;
        width: 140px;
        height: 230px;
        border-radius: 70px 70px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.22), transparent 30%),
          #e8d754;
        transform: skewX(var(--yellow-skew, 0deg));
      }

      .auth-shell.is-typing .ref-character.purple,
      .auth-shell.is-password:not(.show-password) .ref-character.purple {
        left: 110px;
        height: 440px;
        transform: skewX(calc(var(--purple-skew, 0deg) - 12deg)) translateX(34px);
      }

      .auth-shell.is-typing .ref-character.black,
      .auth-shell.is-password:not(.show-password) .ref-character.black {
        transform: skewX(calc(var(--black-skew, 0deg) + 8deg)) translateX(18px);
      }

      .auth-shell.show-password .ref-character.purple,
      .auth-shell.show-password .ref-character.black,
      .auth-shell.show-password .ref-character.orange,
      .auth-shell.show-password .ref-character.yellow {
        transform: skewX(0deg);
      }

      .ref-eyes {
        position: absolute;
        display: flex;
        transition:
          top 680ms cubic-bezier(0.2, 0.8, 0.2, 1),
          left 680ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .ref-character.purple .ref-eyes {
        left: calc(45px + var(--face-x, 0px));
        top: calc(40px + var(--face-y, 0px));
        gap: 28px;
      }

      .ref-character.black .ref-eyes {
        left: calc(26px + var(--face-x, 0px));
        top: calc(32px + var(--face-y, 0px));
        gap: 24px;
      }

      .ref-character.orange .ref-eyes {
        left: calc(82px + var(--face-x, 0px));
        top: calc(90px + var(--face-y, 0px));
        gap: 42px;
      }

      .ref-character.yellow .ref-eyes {
        left: calc(52px + var(--face-x, 0px));
        top: calc(40px + var(--face-y, 0px));
        gap: 36px;
      }

      .auth-shell.is-typing .ref-character.purple .ref-eyes {
        left: 55px;
        top: 65px;
      }

      .auth-shell.is-typing .ref-character.black .ref-eyes {
        left: 32px;
        top: 12px;
      }

      .auth-shell.show-password .ref-character.purple .ref-eyes {
        left: 20px;
        top: 35px;
      }

      .auth-shell.show-password .ref-character.black .ref-eyes {
        left: 10px;
        top: 28px;
      }

      .auth-shell.show-password .ref-character.orange .ref-eyes {
        left: 50px;
        top: 85px;
      }

      .auth-shell.show-password .ref-character.yellow .ref-eyes {
        left: 20px;
        top: 35px;
      }

      .ref-eye {
        position: relative;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #ffffff;
        overflow: hidden;
        transition: height 140ms ease;
      }

      .ref-eye.lg {
        width: 18px;
        height: 18px;
      }

      .ref-eye.md {
        width: 16px;
        height: 16px;
      }

      .ref-eye.dot-eye {
        width: 12px;
        height: 12px;
        background: transparent;
        overflow: visible;
      }

      .ref-pupil {
        display: block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #2d2d2d;
        transform: translate(var(--pupil-x, 0px), var(--pupil-y, 0px));
        transition: transform 120ms ease;
      }

      .ref-pupil.dot {
        width: 12px;
        height: 12px;
      }

      .auth-shell.is-typing .ref-character.purple .ref-pupil {
        transform: translate(3px, 4px);
      }

      .auth-shell.is-typing .ref-character.black .ref-pupil {
        transform: translate(0, -4px);
      }

      .auth-shell.show-password .ref-character.purple .ref-pupil {
        animation: peekLook 1.4s ease-in-out infinite;
      }

      .auth-shell.show-password .ref-character.black .ref-pupil,
      .auth-shell.show-password .ref-character.orange .ref-pupil,
      .auth-shell.show-password .ref-character.yellow .ref-pupil {
        transform: translate(-5px, -4px);
      }

      .yellow-mouth {
        position: absolute;
        left: calc(40px + var(--face-x, 0px));
        top: calc(88px + var(--face-y, 0px));
        width: 80px;
        height: 4px;
        border-radius: 999px;
        background: #2d2d2d;
        transition: left 200ms ease, top 200ms ease;
      }

      .auth-shell.show-password .yellow-mouth {
        left: 10px;
        top: 88px;
      }

      .password-cover {
        position: absolute;
        z-index: 8;
        border-radius: 22px;
        opacity: 0;
        transform: translateY(112px) rotate(0deg);
        transition: transform 360ms ease, opacity 240ms ease;
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.24);
      }

      .password-cover.left {
        left: 23px;
        top: 31px;
        width: 64px;
        height: 48px;
        background: #ff9b6b;
        transform-origin: right bottom;
      }

      .password-cover.right {
        left: 86px;
        top: 31px;
        width: 64px;
        height: 48px;
        background: #e8d754;
        transform-origin: left bottom;
      }

      .auth-shell.is-password:not(.show-password) .password-cover.left {
        opacity: 1;
        transform: translateY(0) rotate(10deg);
      }

      .auth-shell.is-password:not(.show-password) .password-cover.right {
        opacity: 1;
        transform: translateY(0) rotate(-10deg);
      }

      .auth-shell.show-password .password-cover.left {
        opacity: 0.82;
        transform: translate(-36px, 28px) rotate(24deg);
      }

      .auth-shell.show-password .password-cover.right {
        opacity: 0.82;
        transform: translate(36px, 28px) rotate(-24deg);
      }

      @keyframes peekLook {
        0%,
        100% {
          transform: translate(-4px, -4px);
        }
        50% {
          transform: translate(4px, 5px);
        }
      }

      .auth-badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: rgba(255, 255, 255, 0.76);
      }

      .auth-badge-row span {
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
      }

      .auth-form-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 34px;
        background:
          radial-gradient(circle at 70% 10%, rgba(108, 63, 245, 0.08), transparent 30%),
          rgba(255, 255, 255, 0.76);
        backdrop-filter: blur(14px);
      }

      .auth-card,
      .history-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.08);
      }

      .job-event-timeline {
        margin-top: 12px;
      }

      .job-event-item {
        display: grid;
        gap: 6px;
      }

      .job-event-time {
        color: #6b7280;
        font-size: 12px;
      }

      .mobile-only {
        display: none;
      }

      .desktop-only {
        display: block;
      }

      .mobile-card-list {
        display: grid;
        gap: 12px;
      }

      .mobile-only.mobile-card-list {
        display: none;
      }

      .mobile-report-card,
      .mobile-calendar-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 26px rgba(24, 52, 126, 0.07);
      }

      .mobile-card-head {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .mobile-card-title {
        min-width: 0;
        color: #1f3f95;
        font-weight: 850;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .mobile-meta-grid {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .mobile-meta-item {
        display: grid;
        gap: 3px;
      }

      .mobile-meta-label {
        color: #64748b;
        font-size: 12px;
        font-weight: 750;
      }

      .mobile-meta-value {
        color: #27364a;
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .mobile-action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .mobile-action-grid .ant-btn {
        width: 100%;
        min-height: 38px;
        padding-inline: 8px;
        white-space: normal;
        line-height: 1.25;
      }

      .report-action-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .report-progress-hint,
      .mobile-report-progress {
        display: grid;
        gap: 6px;
        width: min(420px, 100%);
      }

      .report-progress-hint .ant-progress,
      .mobile-report-progress .ant-progress {
        margin: 0;
      }

      .auth-card {
        width: min(460px, 100%);
        max-width: 460px;
        padding: 10px;
        border-radius: 24px;
      }

      .qr-modal-content {
        display: grid;
        gap: 14px;
        justify-items: center;
        padding-top: 8px;
      }

      .qr-modal-image {
        width: min(220px, 72vw);
        aspect-ratio: 1;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 14px 30px rgba(24, 52, 126, 0.12);
      }

      .qr-modal-link {
        max-width: 100%;
        margin: 0 !important;
        color: #526071;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .auth-page-actions {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 18px;
      }

      .auth-card .ant-input,
      .auth-card .ant-input-password,
      .auth-card .ant-input-affix-wrapper {
        border-radius: 999px;
      }

      .auth-card .ant-form-item {
        margin-bottom: 16px;
      }

      .auth-primary-button {
        min-width: 148px;
        height: 44px;
        border-radius: 999px;
        font-weight: 850;
        box-shadow: 0 14px 28px rgba(42, 75, 255, 0.18);
      }

      .auth-secondary-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .auth-guest-row {
        display: flex;
        justify-content: center;
        margin-top: 14px;
      }

      .auth-guest-button {
        min-width: 132px;
        height: 42px;
        padding-inline: 22px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 700;
      }

      @media (max-width: 960px) {
        .auth-shell {
          grid-template-columns: 1fr;
        }

        .auth-scene {
          min-height: 380px;
        }
      }

      .gate-card {
        border: 1px solid rgba(42, 75, 255, 0.18);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(240, 244, 255, 0.9));
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.08);
      }

      .main-tabs > .ant-tabs-nav {
        margin-bottom: 18px;
        padding: 8px;
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        box-shadow: 0 12px 30px rgba(24, 52, 126, 0.06);
      }

      .main-tabs .ant-tabs-tab {
        border-radius: 8px;
        background: transparent;
        padding: 14px 22px;
        font-size: 19px;
        font-weight: 800;
        line-height: 1.2;
      }

      .main-tabs .ant-tabs-tab + .ant-tabs-tab {
        margin-left: 12px;
      }

      .main-tabs .ant-tabs-tab-active {
        background: linear-gradient(135deg, #eef2ff, #ffffff);
        box-shadow: 0 8px 18px rgba(42, 75, 255, 0.12);
      }

      .main-tabs .ant-tabs-tab-btn {
        min-width: 82px;
        text-align: center;
      }

      .home-shell,
      .calendar-shell {
        animation: pageIn 320ms ease both;
      }

      .hero-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.72fr);
        gap: 28px;
        min-height: 470px;
        padding: 42px;
        overflow: hidden;
        border: 1px solid rgba(42, 75, 255, 0.18);
        border-radius: 8px;
        background:
          radial-gradient(circle at 92% 18%, rgba(42, 75, 255, 0.18), transparent 28%),
          radial-gradient(circle at 12% 76%, rgba(255, 122, 61, 0.12), transparent 30%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(241, 244, 255, 0.92) 58%, rgba(235, 239, 255, 0.9) 100%);
        box-shadow: 0 22px 56px rgba(24, 52, 126, 0.1);
      }

      .hero-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .hero-copy h1.ant-typography {
        max-width: 820px;
        margin: 0;
        color: #1f3f95;
        font-size: clamp(30px, 4.1vw, 54px);
        line-height: 1.12;
      }

      .hero-lede.ant-typography {
        max-width: 820px;
        margin: 22px 0 26px;
        color: #46554b;
        font-size: 18px;
        line-height: 1.85;
      }

      .hero-board {
        align-self: center;
        padding: 20px;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78), 0 20px 46px rgba(24, 52, 126, 0.09);
        backdrop-filter: blur(12px);
      }

      .board-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .hero-board .ant-statistic {
        min-height: 112px;
        padding: 16px;
        border-radius: 8px;
        background: linear-gradient(180deg, #fbfcff, #f0f3ff);
      }

      .stakeholder-row {
        margin-top: 16px;
      }

      .stakeholder-card,
      .section-card,
      .table-card,
      .summary-row .ant-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 36px rgba(24, 52, 126, 0.07);
      }

      .stakeholder-card {
        height: 100%;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .stakeholder-card:hover,
      .module-card:hover,
      .play-card:hover {
        border-color: rgba(42, 75, 255, 0.26);

    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/dayjs.min.js"></script>
    <script src="vendor/antd.min.js"></script>
    <script>
      const {
        Alert,
        Button,
        Card,
        Col,
        Collapse,
        ConfigProvider,
        Divider,
        Form,
        Input,
        Modal,
        Progress,
        Radio,
        Row,
        Skeleton,
        Select,
        Space,
        Statistic,
        Steps,
        Table,
        Tabs,
        Tag,
        Timeline,
        Typography,
        Upload,
        message,
      } = antd;
      const { Paragraph, Text, Title } = Typography;
      const h = React.createElement;

      function queryStringFromObject(values) {
        const params = new URLSearchParams();
        Object.entries(values || {}).forEach(([key, value]) => {
          if (value === undefined || value === null) return;
          const text = String(value).trim();
          if (!text) return;
          params.set(key, text);
        });
        const query = params.toString();
        return query ? `?${query}` : "";
      }

      function formatChineseDate(date) {
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      }

      function getDynamicDates() {
        const today = new Date();
        const endDate = new Date(today.getFullYear() + 1, today.getMonth(), today.getDate());
        endDate.setDate(endDate.getDate() - 1);
        return {
          todayText: formatChineseDate(today),
          rangeText: `${formatChineseDate(today)} - ${formatChineseDate(endDate)}`,
        };
      }

      function MaterialButtons({ items }) {
        if (!items || !items.length) return h(Text, { type: "secondary" }, "暂无");
        return h(
          Space,
          { direction: "vertical", size: 8, className: "download-list" },
          items.map((item) =>
            h(
              Button,
              { block: true, download: true, href: item.href, key: item.href },
              `下载：${item.label}`,
            ),
          ),
        );
      }

      function formatCalendarNoteText(text, dates) {
        return String(text || "")
          .replaceAll("__TODAY__", dates?.todayText || "")
          .replaceAll("__RANGE__", dates?.rangeText || "");
      }

      function renderCalendarNote(note, dates) {
        if (!note) return h(Text, { type: "secondary" }, "暂无");
        if (typeof note === "string") {
          return note === "暂无" ? h(Text, { type: "secondary" }, note) : h(Paragraph, null, formatCalendarNoteText(note, dates));
        }
        if (note.kind === "plain") {
          return note.text === "暂无" ? h(Text, { type: "secondary" }, note.text) : h(Paragraph, null, formatCalendarNoteText(note.text, dates));
        }
        if (note.kind === "group") {
          return h(
            "div",
            { className: "notes-block" },
            (note.children || []).map((item, index) => renderCalendarNoteNode(item, dates, index)),
          );
        }
        return renderCalendarNoteNode(note, dates, "single");
      }

      function renderCalendarNoteNode(item, dates, key) {
        if (!item) return null;
        if (item.kind === "heading") return h(Text, { strong: true, key }, formatCalendarNoteText(item.text, dates));
        if (item.kind === "paragraph") return h(Paragraph, { key }, formatCalendarNoteText(item.text, dates));
        if (item.kind === "list") {
          return h(
            "ul",
            { key },
            (item.items || []).map((text, index) => h("li", { key: `${key}-${index}` }, formatCalendarNoteText(text, dates))),
          );
        }
        if (item.kind === "text") return h("div", { key }, formatCalendarNoteText(item.text, dates));
        if (item.kind === "plain") return item.text === "暂无" ? h(Text, { key, type: "secondary" }, item.text) : h(Paragraph, { key }, formatCalendarNoteText(item.text, dates));
        return h(Paragraph, { key }, formatCalendarNoteText(item.text || "", dates));
      }

      function MobileMetaItem({ label, children }) {
        return h(
          "div",
          { className: "mobile-meta-item" },
          h("div", { className: "mobile-meta-label" }, label),
          h("div", { className: "mobile-meta-value" }, children),
        );
      }

      const reportStatusMeta = {
        running: { text: "\u751f\u6210\u4e2d", color: "processing" },
        completed: { text: "\u5df2\u5b8c\u6210", color: "green" },
        failed: { text: "\u5931\u8d25", color: "red" },
        cancelled: { text: "\u5df2\u53d6\u6d88", color: "default" },
      };

      function ReportStatusTag({ status }) {
        const meta = reportStatusMeta[status || "completed"] || { text: status || "\u672a\u77e5", color: "default" };
        return h(Tag, { color: meta.color }, meta.text);
      }

      function ReportProgressHint({ row, compact = false }) {
        if (!row || row.status !== "running") return null;
        const percent = Math.max(0, Math.min(100, Math.round(Number(row.progressPercent || 0))));
        const text = row.progressText || "正在处理中";
        return h(
          "div",
          { className: compact ? "mobile-report-progress" : "report-progress-hint" },
          h(Text, { type: "secondary" }, `${text}${percent > 0 ? `（${percent}%）` : ""}`),
          h(Progress, {
            percent: percent || 8,
            size: "small",
            status: "active",
            showInfo: false,
            strokeColor: { "0%": "#4f7cff", "100%": "#8d5cff" },
          }),
        );
      }

      const reviewJobEventMeta = {
        created: { text: "任务创建", color: "blue" },
        progress: { text: "进度更新", color: "processing" },
        cancel_requested: { text: "请求取消", color: "orange" },
        status_changed: { text: "状态变化", color: "purple" },
        current_state: { text: "当前状态", color: "cyan" },
      };

      function ReviewJobEventTimeline({ events = [] }) {
        if (!events.length) {
          return h(Alert, {
            type: "info",
            showIcon: true,
            message: "暂无任务流水",
            description: "旧报告可能还没有生成过程记录；新生成的报告会自动记录任务创建、进度、取消和状态变化。",
          });
        }
        return h(
          Timeline,
          {
            className: "job-event-timeline",
            items: events.map((event) => {
              const meta = reviewJobEventMeta[event.eventType] || { text: event.eventType || "任务事件", color: "gray" };
              const timeText = event.createdAt ? dayjs(event.createdAt).format("YYYY-MM-DD HH:mm:ss") : "";
              const percentText = event.progressPercent ? ` · ${event.progressPercent}%` : "";
              return {
                color: meta.color,
                children: h(
                  "div",
                  { className: "job-event-item" },
                  h(
                    Space,
                    { wrap: true, size: [6, 4] },
                    h(Tag, { color: meta.color }, meta.text),
                    event.status ? h(ReportStatusTag, { status: event.status }) : null,
                    event.progressStage ? h(Tag, null, event.progressStage) : null,
                  ),
                  h(Text, { strong: true }, event.message || meta.text),
                  h("div", { className: "job-event-time" }, `${timeText}${percentText}`),
                ),
              };
            }),
          },
        );
      }

      function ReportActionButtons({ row, compact = false, onRefresh, onRetryOpen, onShowEvents }) {
        const item = normalizeReportArtifact(row);
        const gridClass = compact ? "mobile-action-grid" : "";
        const isCompleted = (row.status || "completed") === "completed" && item.shareUrl;
        const cancelJob = async () => {
          try {
            await apiJson(`/api/review-reports/${encodeURIComponent(row.id)}/cancel`, { method: "POST", body: JSON.stringify({}) });
            message.success("\u5df2\u53d6\u6d88\u8be5\u590d\u76d8\u4efb\u52a1");
            onRefresh?.();
          } catch (err) {
            message.error(err.message || "\u53d6\u6d88\u5931\u8d25");
          }
        };
        const retryJob = async () => {
          try {
            const data = await apiJson(`/api/review-reports/${encodeURIComponent(row.id)}/retry`, { method: "POST", body: JSON.stringify({}) });
            message.info(data.message || "\u8bf7\u56de\u5230AI\u590d\u76d8\u62a5\u544a\u9875\u91cd\u65b0\u53d1\u8d77\u751f\u6210");
            onRefresh?.();
            onRetryOpen?.(row);
          } catch (err) {
            message.error(err.message || "\u91cd\u8bd5\u51c6\u5907\u5931\u8d25");
          }
        };
        if (!isCompleted) {
          return h(
            "div",
            { className: compact ? gridClass : "report-action-inline" },
            h(Button, { onClick: () => onShowEvents?.(row) }, "任务流水"),
            row.status === "running" ? h(Button, { danger: true, onClick: cancelJob }, "\u53d6\u6d88\u4efb\u52a1") : null,
            ["failed", "cancelled"].includes(row.status) ? h(Button, { type: "primary", onClick: retryJob }, "\u91cd\u8bd5") : null,
          );
        }
        return h(
          "div",
          { className: compact ? gridClass : "report-action-inline" },
          h(Button, { href: item.shareUrl, target: "_blank", type: compact ? "primary" : "default" }, "\u6253\u5f00\u5206\u4eab\u9875"),
          h(Button, { onClick: () => showQrModal(item) }, "\u4e8c\u7ef4\u7801"),
          h(Button, { onClick: () => onShowEvents?.(row) }, "任务流水"),
          h(Button, { href: item.svgUrl, target: "_blank" }, "\u4e0b\u8f7dSVG"),
          renderExcelAction(item, "Excel\u6c47\u603b"),
          item.diagnosticsUrl ? h(Button, { href: item.diagnosticsUrl, target: "_blank" }, "\u63a5\u53e3\u8bca\u65ad") : null,
          item.normalizedDataUrl ? h(Button, { href: item.normalizedDataUrl, target: "_blank" }, "\u6807\u51c6\u5316\u6570\u636e") : null,
          h(Button, { onClick: () => copyText(item.shareUrl).then(() => message.success("\u5206\u4eab\u94fe\u63a5\u5df2\u590d\u5236")) }, "\u590d\u5236\u94fe\u63a5"),
        );
      }
      async function readApiJson(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "请求处理失败。");
        return data;
      }

      async function apiJson(url, options = {}) {
        const response = await fetch(url, {
          cache: options.cache || "no-store",
          ...options,
          headers: {
            ...(options.body instanceof FormData ? {} : { "Content-Type": "application/json" }),
            ...(options.headers || {}),
          },
        });
        return readApiJson(response);
      }

      const contentResourceCache = new Map();
      const contentResourceInflight = new Map();

      function useContentResource(url) {
        const cached = contentResourceCache.get(url);
        const [state, setState] = React.useState(() => cached ? { loading: false, data: cached, error: "" } : { loading: true, data: null, error: "" });
        React.useEffect(() => {
          let disposed = false;
          const controller = new AbortController();
          const cachedData = contentResourceCache.get(url);
          if (cachedData) {
            setState({ loading: false, data: cachedData, error: "" });
            return () => {
              disposed = true;
            };
          }
          setState((prev) => ({ loading: true, data: prev.data, error: "" }));
          const request = contentResourceInflight.get(url) || apiJson(url, { signal: controller.signal, cache: "force-cache" })
            .finally(() => {
              contentResourceInflight.delete(url);
            });
          contentResourceInflight.set(url, request);
          request
            .then((data) => {
              contentResourceCache.set(url, data);
              if (!disposed) setState({ loading: false, data, error: "" });
            })
            .catch((error) => {
              if (error?.name === "AbortError") return;
              if (!disposed) setState({ loading: false, data: null, error: error.message || "页面内容加载失败" });
            });
          return () => {
            disposed = true;
            if (!contentResourceInflight.has(url)) controller.abort();
          };
        }, [url]);
        return state;
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      function toCurrentOriginUrl(value) {
        if (!value) return "";
        try {
          const url = new URL(String(value), window.location.origin);
          if (!url.pathname.startsWith("/reports/")) return String(value);
          return `${window.location.origin}${url.pathname}${url.search}${url.hash}`;
        } catch {
          return String(value);
        }
      }

      function reportFileUrl(shareUrl, filename) {
        const base = toCurrentOriginUrl(shareUrl);
        return base ? `${base.replace(/\/?$/, "/")}${filename}` : "";
      }

      function normalizeReportArtifact(artifact = {}) {
        const shareUrl = toCurrentOriginUrl(artifact.shareUrl || artifact.share_url);
        const explicitExcelUrl = artifact.excelUrl || artifact.excel_url || "";
        const excelStatus = String(artifact.excelStatus || artifact.excel_status || (explicitExcelUrl ? "ready" : "")).trim();
        return {
          ...artifact,
          shareUrl,
          svgUrl: toCurrentOriginUrl(artifact.svgUrl || artifact.svg_url || reportFileUrl(shareUrl, "report.svg")),
          qrSvgUrl: toCurrentOriginUrl(artifact.qrSvgUrl || artifact.qr_svg_url || reportFileUrl(shareUrl, "qr.svg")),
          excelUrl: toCurrentOriginUrl(explicitExcelUrl || (!excelStatus ? reportFileUrl(shareUrl, "review.xlsx") : "")),
          excelStatus: excelStatus || (explicitExcelUrl ? "ready" : ""),
          excelError: artifact.excelError || artifact.excel_error || "",
          diagnosticsUrl: toCurrentOriginUrl(artifact.diagnosticsUrl || artifact.diagnostics_url || reportFileUrl(shareUrl, encodeURIComponent("四季蝉接口诊断.json"))),
          normalizedDataUrl: toCurrentOriginUrl(artifact.normalizedDataUrl || artifact.normalized_data_url || reportFileUrl(shareUrl, encodeURIComponent("四季蝉登录获取标准化数据.json"))),
        };
      }

      function renderExcelAction(item, label = "Excel汇总", buttonProps = {}) {
        const status = String(item?.excelStatus || "").trim();
        if (status === "generating") {
          return h(Button, { ...buttonProps, disabled: true, loading: true }, "Excel生成中");
        }
        if (status === "failed") {
          return h(Button, { ...buttonProps, disabled: true, danger: true, title: item.excelError || "Excel汇总生成失败" }, "Excel失败");
        }
        if (item?.excelUrl) {
          return h(Button, { ...buttonProps, href: item.excelUrl, target: "_blank" }, label);
        }
        return null;
      }

      function showQrModal(artifact) {
        const item = normalizeReportArtifact(artifact);
        if (!item.qrSvgUrl) {
          message.warning("暂无二维码");
          return;
        }
        Modal.info({
          title: "扫码查看复盘报告",
          icon: null,
          width: 360,
          centered: true,
          content: h(
            "div",
            { className: "qr-modal-content" },
            h("img", { src: item.qrSvgUrl, alt: "报告二维码", className: "qr-modal-image" }),
            h(Paragraph, { copyable: { text: item.shareUrl }, className: "qr-modal-link" }, item.shareUrl),
          ),
          okText: "关闭",
        });
      }

      function SheetStatusTags({ summary }) {
        if (!summary || !summary.sheetStatus) return null;
        return h(
          Space,
          { wrap: true, className: "sheet-status", size: [8, 8] },
          summary.sheetStatus.map((sheet) =>
            h(
              Tag,
              { key: sheet.name, color: sheet.exists && sheet.rows > 0 ? "blue" : sheet.exists ? "gold" : "red" },
              `${sheet.name}：${sheet.exists ? `${sheet.rows}行` : "缺失"}`,
            ),
          ),
        );
      }

      function DatasetStatusTags({ summary }) {
        if (!summary || !summary.datasetFiles) return null;
        const colorByStatus = {
          detail: "blue",
          metrics: "purple",
          empty: "gold",
          error: "red",
        };
        return h(
          Space,
          { wrap: true, className: "sheet-status", size: [8, 8] },
          summary.datasetFiles.map((file) =>
            h(
              Tag,
              { key: file.name, color: colorByStatus[file.status] || (file.rowCount > 0 ? "blue" : "gold") },
              `${file.label || file.name}：${file.statusText || `${file.rowCount}行`}`,
            ),
          ),
        );
      }

      function GateCard({ title, text, onLogin, onRegister }) {
        return h(
          Card,
          { bordered: false, className: "gate-card" },
          h(Tag, { color: "blue", className: "hero-platform-tag" }, "需要登录"),
          h(Title, { level: 3 }, title || "请先登录后继续"),
          h(Paragraph, null, text || "登录后即可上传客户数据、生成AI复盘报告，并查看历史报告。"),
          h(
            Space,
            { wrap: true },
            h(Button, { type: "primary", onClick: onLogin }, "登录"),
            h(Button, { onClick: onRegister }, "注册账号"),
          ),
        );
      }

      function RefEye({ size = "lg", dot = false, style }) {
        return h(
          "span",
          { className: `ref-eye ${dot ? "dot-eye" : size}` },
          h("span", { className: `ref-pupil ${dot ? "dot" : ""}`, style }),
        );
      }

      function RefCharacters({ look, typing, hidingPassword, showingPassword }) {
        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        const face = {
          x: clamp(look.x * 15, -15, 15),
          y: clamp(look.y * 10, -10, 10),
        };
        const pupil = {
          x: clamp(look.x * 5, -5, 5),
          y: clamp(look.y * 5, -5, 5),
        };
        const makeStyle = (scale = 1) => ({
          "--face-x": `${face.x * scale}px`,
          "--face-y": `${face.y * scale}px`,
          "--pupil-x": `${pupil.x}px`,
          "--pupil-y": `${pupil.y}px`,
        });
        const bodyStyle = {
          "--purple-skew": `${clamp(-look.x * 6, -6, 6)}deg`,
          "--black-skew": `${clamp(-look.x * 5, -6, 6)}deg`,
          "--orange-skew": `${clamp(-look.x * 4, -5, 5)}deg`,
          "--yellow-skew": `${clamp(-look.x * 4, -5, 5)}deg`,
        };
        const hiding = hidingPassword && !showingPassword;
        const purpleStyle = { ...makeStyle(1), "--purple-skew": bodyStyle["--purple-skew"] };
        const blackStyle = { ...makeStyle(0.82), "--black-skew": bodyStyle["--black-skew"] };
        const orangeStyle = { ...makeStyle(0.55), "--orange-skew": bodyStyle["--orange-skew"] };
        const yellowStyle = { ...makeStyle(0.7), "--yellow-skew": bodyStyle["--yellow-skew"] };
        const pupilStyle = { "--pupil-x": `${pupil.x}px`, "--pupil-y": `${pupil.y}px` };

        return h(
          "div",
          { className: "ref-characters", "aria-label": "四季蝉登录动画角色" },
          h(
            "div",
            { className: "ref-character purple", style: purpleStyle },
            h(
              "div",
              { className: "ref-eyes" },
              h(RefEye, { size: "lg", style: pupilStyle }),
              h(RefEye, { size: "lg", style: pupilStyle }),
            ),
            h("span", { className: "password-cover left" }),
            h("span", { className: "password-cover right" }),
          ),
          h(
            "div",
            { className: "ref-character black", style: blackStyle },
            h(
              "div",
              { className: "ref-eyes" },
              h(RefEye, { size: "md", style: pupilStyle }),
              h(RefEye, { size: "md", style: pupilStyle }),
            ),
          ),
          h(
            "div",
            { className: "ref-character orange", style: orangeStyle },
            h(
              "div",
              { className: "ref-eyes" },
              h(RefEye, { dot: true, style: pupilStyle }),
              h(RefEye, { dot: true, style: pupilStyle }),
            ),
          ),
          h(
            "div",
            { className: "ref-character yellow", style: yellowStyle },
            h(
              "div",
              { className: "ref-eyes" },
              h(RefEye, { dot: true, style: pupilStyle }),
              h(RefEye, { dot: true, style: pupilStyle }),
            ),
            h("span", { className: "yellow-mouth" }),
          ),
        );
      }

      function AuthPage({ mode, onModeChange, onAuthed, onGuestBrowse }) {
        const [form] = Form.useForm();
        const [loading, setLoading] = React.useState(false);
        const [focusType, setFocusType] = React.useState("");
        const [showPassword, setShowPassword] = React.useState(false);
        const [look, setLook] = React.useState({ x: 0, y: 0 });
        const isRegister = mode === "register";
        const passwordValue = Form.useWatch("password", form) || "";
        const isTyping = focusType && focusType !== "password";
        const isPassword = focusType === "password" || passwordValue.length > 0;
        const sceneClassName = [
          "auth-shell",
          isTyping ? "is-typing" : "",
          isPassword ? "is-password" : "",
          showPassword ? "show-password" : "",
        ].filter(Boolean).join(" ");
        const onMouseMove = (event) => {
          const rect = event.currentTarget.getBoundingClientRect();
          const x = Math.max(-1, Math.min(1, (event.clientX - (rect.left + rect.width / 2)) / (rect.width / 2)));
          const y = Math.max(-1, Math.min(1, (event.clientY - (rect.top + rect.height / 2)) / (rect.height / 2)));
          setLook({ x, y });
        };
        const submit = async () => {
          const values = await form.validateFields();
          setLoading(true);
          try {
            const data = await apiJson(isRegister ? "/api/auth/register" : "/api/auth/login", {
              method: "POST",
              body: JSON.stringify(values),
            });
            message.success(isRegister ? "注册成功，已自动登录" : "登录成功");
            onAuthed(data);
          } catch (err) {
            message.error(err.message || "处理失败");
          } finally {
            setLoading(false);
          }
        };

        return h(
          "div",
          { className: sceneClassName, onMouseMove },
          h(
            "section",
            { className: "auth-scene" },
            h(
              "div",

      function AIReviewWorkspace({ auth }) {
        const [sourceType, setSourceType] = React.useState("sijichan");
        const [sourceForm] = Form.useForm();
        const [status, setStatus] = React.useState(null);
        const [file, setFile] = React.useState(null);

        const [markdown, setMarkdown] = React.useState("");
        const [artifact, setArtifact] = React.useState(null);
        const [reviewProgress, setReviewProgress] = React.useState(null);
        const [weComHandoff, setWeComHandoff] = React.useState(null);
        const [weComBrowserSession, setWeComBrowserSession] = React.useState(null);
        const [weComBrowserDebug, setWeComBrowserDebug] = React.useState(null);
        const progressTimersRef = React.useRef([]);
        const reviewStatusPollRef = React.useRef(null);
        const handoffPollRef = React.useRef(null);
        const browserSessionPollRef = React.useRef(null);
        const generateRequestRef = React.useRef(null);
        const detailRequestRef = React.useRef(null);
        const weComRequestControllersRef = React.useRef(new Set());
        const createWeComBrowserSessionRef = React.useRef(null);
        const weComQrRefreshRef = React.useRef({ count: 0, running: false, lastAt: 0 });
        const weComSsoUrl = "https://login.work.weixin.qq.com/wwlogin/sso/login/?login_type=CorpApp&appid=ww408c023179829552&agentid=1000157&redirect_uri=https%3A%2F%2Fmerchants.hydee.cn%2Fapp-jump%2Fsuper-admin-login&state=WWLogin";

        const loadStatus = React.useCallback(async (options = {}) => {
          const response = await fetch("/api/ai-config/status", { signal: options.signal });
          setStatus(await response.json());
        }, []);

        React.useEffect(() => {
          const controller = new AbortController();
          loadStatus({ signal: controller.signal }).catch((error) => {
            if (error?.name !== "AbortError") setStatus({ configured: false });
          });
          return () => controller.abort();
        }, [loadStatus]);

        const beginWeComRequest = React.useCallback(() => {
          const controller = new AbortController();
          weComRequestControllersRef.current.add(controller);
          return controller;
        }, []);

        const finishWeComRequest = React.useCallback((controller) => {
          weComRequestControllersRef.current.delete(controller);
        }, []);

        const abortWeComRequests = React.useCallback(() => {
          weComRequestControllersRef.current.forEach((controller) => controller.abort());
          weComRequestControllersRef.current.clear();
        }, []);

        React.useEffect(() => () => {
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          progressTimersRef.current = [];
          if (reviewStatusPollRef.current) clearInterval(reviewStatusPollRef.current);
          if (handoffPollRef.current) clearInterval(handoffPollRef.current);
          if (browserSessionPollRef.current) clearInterval(browserSessionPollRef.current);
          abortWeComRequests();
          if (generateRequestRef.current) {
            generateRequestRef.current.abort();
            generateRequestRef.current = null;
          }
          if (detailRequestRef.current) {
            detailRequestRef.current.abort();
            detailRequestRef.current = null;
          }
        }, []);

        const stopReviewStatusPolling = React.useCallback(() => {
          if (reviewStatusPollRef.current) {
            clearInterval(reviewStatusPollRef.current);
            reviewStatusPollRef.current = null;
          }
        }, []);

        const abortReviewRequests = React.useCallback((options = {}) => {
          let aborted = false;
          if (!options.keepGenerate && generateRequestRef.current) {
            generateRequestRef.current.abort();
            generateRequestRef.current = null;
            aborted = true;
          }
          if (!options.keepDetail && detailRequestRef.current) {
            detailRequestRef.current.abort();
            detailRequestRef.current = null;
            aborted = true;
          }
          return aborted;
        }, []);

        const beginGenerateRequest = React.useCallback(() => {
          abortReviewRequests();
          const controller = new AbortController();
          generateRequestRef.current = controller;
          return controller;
        }, [abortReviewRequests]);

        const beginDetailRequest = React.useCallback(() => {
          abortReviewRequests({ keepGenerate: true });
          const controller = new AbortController();
          detailRequestRef.current = controller;
          return controller;
        }, [abortReviewRequests]);

        const reviewSourceGroupFor = React.useCallback((type) => {
          if (type === "excel") return "excel";
          if (type === "wecom") return "wecom";
          return "sijichan";
        }, []);

        const reviewStepsFor = React.useCallback((type) => {
          return type === "excel"
            ? [
                { title: "校验模板", description: "正在检查Excel文件格式与模板结构。" },
                { title: "上传数据", description: "正在安全上传客户复盘数据。" },
                { title: "AI分析", description: "正在识别品种增长、奖励闭环和下期建议。" },
                { title: "生成报告", description: "正在生成分享网页、SVG长图和二维码。" },
              ]
            : [
                { title: "登录中", description: "正在登录四季蝉后台并获取授权。" },
                { title: "读取销售数据", description: "正在读取销售汇总、上月对比和半年对比数据。" },
                { title: "读取奖励活动", description: "正在读取奖励统计、活动汇总和概览校验数据。" },
                { title: "读取培训打赏", description: "正在读取培训情况和厂家打赏数据。" },
                { title: "生成报告", description: "正在生成AI报告和分享材料，Excel汇总将在后台生成。" },
              ];
        }, []);

        const reviewStepIndexForStage = React.useCallback((type, stage) => {
          const normalized = String(stage || "").trim();
          if (type === "excel") {
            return {
              queued: 0,
              template_validated: 1,
              ai_generating: 2,
              publishing: 3,
              completed: 3,
              failed: 0,
              cancelled: 0,
            }[normalized] ?? 0;
          }
          return {
            queued: 0,
            collecting: 1,
            dataset_ready: 3,
            ai_generating: 4,
            publishing: 4,
            completed: 4,
            failed: 0,
            cancelled: 0,
          }[normalized] ?? 0;
        }, []);

        const applyRunningReportProgress = React.useCallback((runningReport, type) => {
          if (!runningReport) return;
          const steps = reviewStepsFor(type);
          const startedAtMs = runningReport.startedAt ? dayjs(runningReport.startedAt).valueOf() : Date.now();
          const elapsedSeconds = Math.max(0, Math.floor((Date.now() - startedAtMs) / 1000));
          setReviewProgress({
            steps,
            current: reviewStepIndexForStage(type, runningReport.progressStage),
            status: "process",
            text: runningReport.progressText || "正在处理",
            elapsedSeconds,
            percent: Number(runningReport.progressPercent || 8),
            startedAt: startedAtMs,
            backendReportId: runningReport.id,
          });
        }, [reviewStepIndexForStage, reviewStepsFor]);

        const startReviewStatusPolling = React.useCallback((type, options = {}) => {
          stopReviewStatusPolling();
          const sourceGroup = reviewSourceGroupFor(type);
          const poll = async () => {
            try {
              const data = await apiJson(`/api/review-reports/running?sourceGroup=${encodeURIComponent(sourceGroup)}`);
              if (data.report) {
                applyRunningReportProgress(data.report, type);
              } else if (options.keepLocalWhenMissing !== true) {
                setReviewProgress((prev) => (prev?.status === "process" ? null : prev));
              }
            } catch {
              // ignore polling errors and keep local progress fallback
            }
          };
          poll();
          reviewStatusPollRef.current = window.setInterval(poll, 4000);
        }, [applyRunningReportProgress, reviewSourceGroupFor, stopReviewStatusPolling]);

        const resetReport = (options = {}) => {
          const aborted = !options.keepRequests && abortReviewRequests();
          if (aborted && !options.keepLoading) setLoading(false);
          setError("");
          setReport(null);
          setMarkdown("");
          setSummary(null);
          setArtifact(null);
          setReviewProgress(null);
          setWeComBrowserDebug(null);
          stopReviewStatusPolling();
          if (!options.keepWeComHandoff) setWeComHandoff(null);
          if (!options.keepWeComHandoff) setWeComBrowserSession(null);
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          progressTimersRef.current = [];
          if (!options.keepWeComHandoff && handoffPollRef.current) {
            clearInterval(handoffPollRef.current);
            handoffPollRef.current = null;
          }
          if (!options.keepWeComHandoff && browserSessionPollRef.current) {
            clearInterval(browserSessionPollRef.current);
            browserSessionPollRef.current = null;
          }
          if (!options.keepWeComHandoff) abortWeComRequests();
        };

        React.useEffect(() => {
          if (!auth?.user) return undefined;
          let disposed = false;
          const controller = new AbortController();
          const loadRunning = async () => {
            try {
              const data = await apiJson(`/api/review-reports/running?sourceGroup=${encodeURIComponent(reviewSourceGroupFor(sourceType))}`, { signal: controller.signal });
              if (disposed || !data.report) return;
              applyRunningReportProgress(data.report, sourceType);
              startReviewStatusPolling(sourceType);
            } catch (error) {
              if (error?.name !== "AbortError") {
                // ignore
              }
            }
          };
          loadRunning();
          return () => {
            disposed = true;
            controller.abort();
          };
        }, [auth?.user, sourceType, applyRunningReportProgress, reviewSourceGroupFor, startReviewStatusPolling]);

        const startReviewProgress = (type) => {
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          progressTimersRef.current = [];
          const steps = reviewStepsFor(type);
          const finalStep = steps.length - 1;
          const startedAt = Date.now();
          const waitMessages = [
            [0, "正在排队处理请求，准备复盘数据。"],
            [8, "已进入报告生成阶段，AI正在阅读完整数据摘要。"],
            [20, "数据量较大时需要更久一点，正在整理核心结论和复盘建议。"],
            [40, "仍在等待AI返回结果；系统会继续保留完整摘要，不压缩分析上下文。"],
            [60, "报告生成可能还需要一段时间，你可以稍后到【历史复盘报告】查看生成结果。"],
            [120, "仍在生成中，请保持页面或稍后进入【历史复盘报告】查看。"],
            [180, "等待已超过3分钟，数据生成可能失败；可到【历史复盘报告】查看状态并重新生成。"],
          ];
          const waitTextFor = (elapsedSeconds) => {
            let text = waitMessages[0][1];
            for (const [threshold, messageText] of waitMessages) {
              if (elapsedSeconds >= threshold) text = messageText;
            }
            return text;
          };
          const progressPercentFor = (elapsedSeconds, current) => {
            if (current < finalStep) return Math.min(72, 12 + current * 18 + Math.floor(elapsedSeconds / 2));
            return Math.min(96, 72 + Math.floor(Math.max(0, elapsedSeconds - 8) / 3));
          };
          setReviewProgress({
            steps,
            current: 0,
            status: "process",
            text: steps[0].description,
            elapsedSeconds: 0,
            percent: 8,
            startedAt,
          });
          const schedule = [
            [700, 1],
            [2200, 2],
            [5200, 3],
            [7600, 4],
          ].filter(([, current]) => current <= finalStep);
          schedule.forEach(([delay, current]) => {
            const timer = setTimeout(() => {
              setReviewProgress((prev) => {
                if (!prev || prev.status !== "process") return prev;
                if (prev.backendReportId) return prev;
                const elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
                return {
                  ...prev,
                  current,
                  elapsedSeconds,
                  percent: progressPercentFor(elapsedSeconds, current),
                  text: current >= finalStep ? waitTextFor(elapsedSeconds) : prev.steps[current].description,
                };
              });
            }, delay);
            progressTimersRef.current.push(timer);
          });
          const interval = setInterval(() => {
            setReviewProgress((prev) => {
              if (!prev || prev.status !== "process") return prev;
              if (prev.backendReportId) return prev;
              const elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
              const current = elapsedSeconds >= 8 ? Math.max(prev.current, finalStep) : prev.current;
              return {
                ...prev,
                current,
                elapsedSeconds,
                percent: progressPercentFor(elapsedSeconds, current),
                text: current >= finalStep ? waitTextFor(elapsedSeconds) : prev.steps[current].description,
              };
            });
          }, 3000);
          progressTimersRef.current.push(interval);
          startReviewStatusPolling(type, { keepLocalWhenMissing: true });
        };

        const finishReviewProgress = (ok, text) => {
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          progressTimersRef.current = [];
          stopReviewStatusPolling();
          setReviewProgress((prev) => {
            if (!prev) return null;
            return {
              ...prev,
              current: ok ? prev.steps.length - 1 : Math.max(prev.current, 0),
              status: ok ? "finish" : "error",
              percent: ok ? 100 : prev.percent,
              text: text || (ok ? "复盘报告已生成，可打开分享页或下载长图。" : "生成失败，请检查数据或稍后重试。"),
            };
          });
        };

        const loadGeneratedReportDetail = async (reportDbId, options = {}) => {
          if (!reportDbId) return null;
          const controller = beginDetailRequest();
          try {
            const data = await apiJson(`/api/review-reports/${encodeURIComponent(reportDbId)}`, { signal: controller.signal });
            if (detailRequestRef.current !== controller) return null;
            const detail = data.report || {};
            setSummary(detail.summary || options.fallbackSummary || null);
            setReport(detail.report || null);
            setMarkdown(detail.markdown || "");
            setArtifact(normalizeReportArtifact({ ...(options.artifact || {}), ...detail }));
            return detail;
          } catch (err) {
            if (err?.name === "AbortError") return null;
            if (options.fallbackSummary) setSummary(options.fallbackSummary);
            if (options.artifact) setArtifact(normalizeReportArtifact(options.artifact));
            message.warning(err.message || "报告详情加载失败，可到历史复盘报告查看。");
            return null;
          } finally {
            if (detailRequestRef.current === controller) detailRequestRef.current = null;
          }
        };

        React.useEffect(() => {
          const reportDbId = artifact?.id || artifact?.reportDbId || artifact?.report_db_id;
          if (!reportDbId || artifact?.excelStatus !== "generating") return undefined;
          let disposed = false;
          let interval = null;
          const refreshExcelState = async () => {
            try {
              const data = await apiJson(`/api/review-reports/${encodeURIComponent(reportDbId)}/status`);
              if (disposed) return;
              const detail = data.report || {};
              const nextArtifact = normalizeReportArtifact({ ...artifact, ...detail });
              setArtifact(nextArtifact);
              if (nextArtifact.excelStatus !== "generating" && interval) {
                clearInterval(interval);
                interval = null;
              }
            } catch {
              // Keep the visible report; history can still be refreshed manually.
            }
          };
          const timeout = window.setTimeout(refreshExcelState, 2500);
          interval = window.setInterval(refreshExcelState, 5000);
          return () => {
            disposed = true;
            window.clearTimeout(timeout);
            if (interval) window.clearInterval(interval);
          };
        }, [artifact?.id, artifact?.reportDbId, artifact?.report_db_id, artifact?.excelStatus]);

        const openWeComSso = () => {
          const values = sourceForm.getFieldsValue();
          const merCode = String(values.merCode || "").trim();
          if (merCode) {
            copyText(merCode).then(() => message.success("客户编码已复制，扫码后可直接粘贴"));
          }
          window.open(weComSsoUrl, "_blank", "noopener,noreferrer");
        };

        const refreshExpiredWeComQr = () => {
          const state = weComQrRefreshRef.current || { count: 0, running: false, lastAt: 0 };
          const now = Date.now();
          if (state.running || state.count >= 6 || now - state.lastAt < 30000) return;
          const createSession = createWeComBrowserSessionRef.current;
          if (typeof createSession !== "function") return;
          weComQrRefreshRef.current = { count: state.count + 1, running: true, lastAt: now };
          message.info("企微二维码已过期，正在自动刷新二维码");
          Promise.resolve(createSession({ autoRefresh: true }))
            .catch(() => null)
            .finally(() => {
              weComQrRefreshRef.current.running = false;
            });
        };

        const pollWeComHandoff = React.useCallback((handoffId) => {

      function AIConfigWorkspace({ auth }) {
        const [form] = Form.useForm();
        const [promptForm] = Form.useForm();
        const [status, setStatus] = React.useState(null);
        const [saving, setSaving] = React.useState(false);
        const [testing, setTesting] = React.useState(false);
        const [promptMeta, setPromptMeta] = React.useState({ defaultInstruction: "", updatedAt: "" });
        const [promptLoading, setPromptLoading] = React.useState(false);
        const [promptSaving, setPromptSaving] = React.useState(false);

        const loadStatus = React.useCallback(async (options = {}) => {
          const response = await fetch("/api/ai-config/status", { signal: options.signal });
          const data = await response.json();
          setStatus(data);
          form.setFieldsValue({
            baseUrl: data.baseUrl || "https://api.deepseek.com",
            model: data.model || "deepseek-v4-flash",
            protocol: data.protocol || "chat_completions",
          });
        }, [form]);

        const loadPrompt = React.useCallback(async (options = {}) => {
          if (auth?.user?.role !== "admin") return;
          setPromptLoading(true);
          try {
            const response = await fetch("/api/review-prompt", { signal: options.signal });
            const data = await readApiJson(response);
            promptForm.setFieldsValue({ instruction: data.instruction || "" });
            setPromptMeta({
              defaultInstruction: data.defaultInstruction || "",
              updatedAt: data.updatedAt || "",
            });
          } catch (err) {
            if (err?.name !== "AbortError") message.error(err.message || "\u590d\u76d8AI\u6307\u4ee4\u52a0\u8f7d\u5931\u8d25");
          } finally {
            if (!options.signal?.aborted) setPromptLoading(false);
          }
        }, [auth?.user?.role, promptForm]);

        React.useEffect(() => {
          const controller = new AbortController();
          loadStatus({ signal: controller.signal }).catch((error) => {
            if (error?.name !== "AbortError") setStatus({ configured: false });
          });
          return () => controller.abort();
        }, [loadStatus]);

        React.useEffect(() => {
          const controller = new AbortController();
          loadPrompt({ signal: controller.signal }).catch(() => {});
          return () => controller.abort();
        }, [loadPrompt]);

        const saveConfig = async () => {
          const values = await form.validateFields();
          setSaving(true);
          try {
            const response = await fetch("/api/ai-config", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(values),
            });
            const data = await readApiJson(response);
            setStatus(data.status);
            form.setFieldsValue({ apiKey: "" });
            message.success("AI配置已保存");
          } catch (err) {
            message.error(err.message || "保存失败");
          } finally {
            setSaving(false);
          }
        };

        const testConfig = async () => {
          const values = await form.validateFields();
          setTesting(true);
          try {
            const response = await fetch("/api/ai-config/test", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(values),
            });
            const data = await readApiJson(response);
            message.success(data.message || "连接成功");
          } catch (err) {
            message.error(err.message || "连接失败");
          } finally {
            setTesting(false);
          }
        };

        const savePrompt = async () => {
          const values = await promptForm.validateFields();
          setPromptSaving(true);
          try {
            const response = await fetch("/api/review-prompt", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ instruction: values.instruction }),
            });
            const data = await readApiJson(response);
            promptForm.setFieldsValue({ instruction: data.instruction || values.instruction });
            setPromptMeta((current) => ({ ...current, updatedAt: data.updatedAt || current.updatedAt }));
            message.success(data.message || "\u590d\u76d8AI\u6307\u4ee4\u5df2\u4fdd\u5b58");
          } catch (err) {
            message.error(err.message || "\u590d\u76d8AI\u6307\u4ee4\u4fdd\u5b58\u5931\u8d25");
          } finally {
            setPromptSaving(false);
          }
        };

        const resetPrompt = async () => {
          setPromptSaving(true);
          try {
            const response = await fetch("/api/review-prompt", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ reset: true }),
            });
            const data = await readApiJson(response);
            promptForm.setFieldsValue({ instruction: data.instruction || promptMeta.defaultInstruction || "" });
            setPromptMeta({
              defaultInstruction: data.instruction || promptMeta.defaultInstruction || "",
              updatedAt: data.updatedAt || "",
            });
            message.success(data.message || "\u590d\u76d8AI\u6307\u4ee4\u5df2\u6062\u590d\u9ed8\u8ba4");
          } catch (err) {
            message.error(err.message || "\u6062\u590d\u9ed8\u8ba4\u5931\u8d25");
          } finally {
            setPromptSaving(false);
          }
        };

        const apiKeyPlaceholder = status?.hasOwnConfig
          ? "当前账号已保存，留空则继续沿用自己的API Key"

            ? "当前账号未保存；填写后将优先使用自己的API Key"

        const juneActivityPacks = contentData?.juneActivityPacks || [];
        const now = new Date();
        const monthLabel = `${now.getMonth() + 1}月`;
        const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
        const [monthly, setMonthly] = React.useState({ aggregate: null, loading: false, generating: false, loaded: false });
        const [slideIndex, setSlideIndex] = React.useState(0);
        const monthlyRequestRef = React.useRef(null);
        const loadMonthly = React.useCallback(async () => {
          if (!auth?.user) return;
          if (monthlyRequestRef.current) monthlyRequestRef.current.abort();
          const controller = new AbortController();
          monthlyRequestRef.current = controller;
          setMonthly((prev) => ({ ...prev, loading: true }));
          try {
            const data = await apiJson(`/api/monthly-marketing-recommendations?month=${monthKey}`, { signal: controller.signal });
            if (monthlyRequestRef.current !== controller) return;
            setMonthly((prev) => ({ ...prev, aggregate: data.aggregate || null, loading: false, loaded: true }));
            setSlideIndex(0);
          } catch (error) {
            if (error?.name === "AbortError") return;
            if (monthlyRequestRef.current === controller) {
              setMonthly((prev) => ({ ...prev, loading: false, loaded: true, error: error.message }));
            }
          } finally {
            if (monthlyRequestRef.current === controller) monthlyRequestRef.current = null;
          }
        }, [auth?.user?.id, monthKey]);
        React.useEffect(() => {
          loadMonthly();

        const [activeKey, setActiveKey] = React.useState("home");
        const [auth, setAuth] = React.useState({ user: null, profile: null, loading: true });
        const initialAuthPage = new URLSearchParams(window.location.search).get("page");
        const defaultLoginHost = window.location.hostname === "192.168.1.200";
        const [authPage, setAuthPage] = React.useState(initialAuthPage === "register" ? "register" : initialAuthPage === "login" ? "login" : defaultLoginHost ? "login" : "");
        const dates = React.useMemo(getDynamicDates, []);
        const loadMe = React.useCallback(async () => {
          try {
            const data = await apiJson("/api/auth/me");
            setAuth({ user: data.user || null, profile: data.profile || null, database: data.database, loading: false });
          } catch {
            setAuth({ user: null, profile: null, loading: false });
          }
        }, []);
        React.useEffect(() => {
          loadMe();
        }, [loadMe]);

        const onAuthed = (data) => {
          setAuth({ user: data.user || null, profile: data.profile || null, loading: false });
          setAuthPage("");
          window.history.replaceState(null, "", `${window.location.pathname}?v=auth-portal`);
          setActiveKey("aiReview");
        };
        const logout = async () => {
          await apiJson("/api/auth/logout", { method: "POST", body: "{}" }).catch(() => null);
          setAuth({ user: null, profile: null, loading: false });
          setAuthPage("");
          window.history.replaceState(null, "", `${window.location.pathname}?v=auth-portal`);
          setActiveKey("home");
          message.success("已退出登录");
        };
        const openAuthPage = (mode) => {
          setAuthPage(mode);
          window.history.pushState(null, "", `${window.location.pathname}?page=${mode}`);
        };
        const openLogin = () => openAuthPage("login");
        const openRegister = () => openAuthPage("register");
        const openGuestBrowse = () => {
          setAuthPage("");
          window.history.replaceState(null, "", `${window.location.pathname}?v=guest`);
          setActiveKey("home");
        };
        const authProps = { auth, onLogin: openLogin, onRegister: openRegister };
        const tabItems = [
          { key: "home", label: "首页", children: h(HomePage, { onOpenCalendar: () => setActiveKey("calendar") }) },
          { key: "calendar", label: "对接行事历", children: h(CalendarPage, { dates }) },
          { key: "incentive", label: "激励玩法", children: h(IncentivePage) },
          { key: "selection", label: "选品思路", children: h(SelectionPage) },
          { key: "june", label: "当月营销推荐", children: h(JuneMarketingPage, authProps) },
          { key: "aiReview", label: "AI复盘报告", children: h(AIReviewPage, authProps) },
          { key: "history", label: "历史报告", children: h(HistoryPage, authProps) },
          ...(auth.user ? [{ key: "maintenance", label: "系统维护", children: h(SystemMaintenancePage, authProps) }] : []),
        ];

        if (authPage && !auth.user) {
          return h(
            ConfigProvider,
            {
              theme: {
                token: {
                  colorPrimary: "#2a4bff",
                  borderRadius: 8,
                  colorInfo: "#2a4bff",
                  fontFamily: '"Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif',
                },
              },
            },
            h("main", { className: "auth-route-shell" }, h(AuthPage, { mode: authPage, onModeChange: openAuthPage, onAuthed, onGuestBrowse: openGuestBrowse })),
          );
        }

        return h(
          ConfigProvider,
          {
            theme: {
              token: {
                colorPrimary: "#2a4bff",
                borderRadius: 8,
                colorInfo: "#2a4bff",
                fontFamily: '"Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif',
              },
            },
          },
          h(
            "main",
            { className: "app-shell" },
            h(
              "header",
              { className: "app-header" },
              h(
                "div",
                { className: "brand-lockup" },
                h("img", { src: "assets/四季蝉.png", alt: "四季蝉logo", className: "brand-logo" }),
                h(
                  "div",
                  { className: "brand-copy" },
                  h(Text, { className: "brand-kicker" }, "It is like an all-season cicada; you can hear its song even in winter."),
                  h(Title, null, "海典四季蝉"),
                  h(Paragraph, null, "帮助连锁重点品动销加速的运营数字化解决方案"),
                ),
              ),
              h(
                "div",
                { className: "user-panel" },
                auth.user
                  ? [
                      h(Tag, { color: auth.user.role === "admin" ? "gold" : "blue", key: "role" }, auth.user.role === "admin" ? "管理员" : "客户"),
                      h(Text, { strong: true, key: "name" }, auth.user.name),
                      h(Button, { key: "history", onClick: () => setActiveKey("history") }, "历史报告"),
                      h(Button, { key: "logout", onClick: logout }, "退出登录"),
                    ]
                  : [
                      h(Button, { key: "login", onClick: openLogin }, "登录"),
                      h(Button, { key: "register", type: "primary", onClick: openRegister }, "注册"),
                    ],
              ),
            ),
            h(Tabs, {
              activeKey,
              className: "main-tabs",
              destroyInactiveTabPane: true,
              destroyOnHidden: true,
              onChange: setActiveKey,
              items: tabItems,
            }),
          ),
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
