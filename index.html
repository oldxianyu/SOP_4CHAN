<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海典四季蝉</title>
    <link rel="icon" type="image/png" href="assets/四季蝉.png" />
    <link rel="apple-touch-icon" href="assets/四季蝉.png" />
    <link rel="stylesheet" href="vendor/antd-reset.css" />
    <style>
      :root {
        color: #1f2a24;
        background: #f4f7f3;
        font-synthesis: none;
        text-rendering: geometricPrecision;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          radial-gradient(circle at 18% 8%, rgba(47, 77, 255, 0.14), transparent 28%),
          radial-gradient(circle at 78% 2%, rgba(255, 122, 61, 0.12), transparent 24%),
          linear-gradient(180deg, #f5f7ff 0%, #fafbff 48%, #f8fafc 100%);
        font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      .app-shell {
        width: min(1480px, calc(100% - 40px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-end;
        margin-bottom: 14px;
        padding: 14px 16px;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(239, 242, 255, 0.82));
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.08);
        backdrop-filter: blur(10px);
      }

      .brand-lockup {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .brand-logo {
        width: clamp(50px, 5.4vw, 68px);
        height: clamp(50px, 5.4vw, 68px);
        padding: 8px;
        border: 1px solid rgba(42, 75, 255, 0.18);
        border-radius: 20px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(238, 242, 255, 0.88));
        object-fit: contain;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 12px 28px rgba(24, 52, 126, 0.12);
      }

      .brand-kicker {
        display: block;
        max-width: 760px;
        margin-bottom: 2px;
        color: #64748b;
        font-size: clamp(14px, 1.6vw, 18px);
        font-weight: 650;
        line-height: 1.35;
      }

      .brand-copy h1.ant-typography {
        margin-top: 0;
      }

      .app-header h1.ant-typography {
        margin: 2px 0 4px;
        color: #1f3f95;
        font-size: clamp(28px, 3.2vw, 42px);
        line-height: 1.06;
      }

      .user-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
      }

      .auth-shell,
      .history-shell {
        animation: pageIn 320ms ease both;
      }

      .auth-route-shell {
        width: 100%;
        min-height: 100vh;
        padding: 0;
      }

      .auth-shell {
        min-height: min(760px, calc(100vh - 178px));
        display: grid;
        grid-template-columns: minmax(440px, 1.02fr) minmax(360px, 0.74fr);
        overflow: hidden;
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 28px;
        background:
          radial-gradient(circle at 18% 18%, rgba(108, 63, 245, 0.13), transparent 28%),
          radial-gradient(circle at 88% 18%, rgba(255, 155, 107, 0.13), transparent 25%),
          linear-gradient(135deg, #f8faff 0%, #eef3ff 54%, #fff8f1 100%);
        box-shadow: 0 34px 90px rgba(24, 52, 126, 0.14);
      }

      .auth-route-shell .auth-shell {
        width: 100%;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        grid-template-columns: minmax(610px, 1fr) minmax(460px, 0.74fr);
      }

      .auth-scene {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 100%;
        padding: 38px 42px;
        overflow: hidden;
        color: #ffffff;
        background:
          radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.22), transparent 25%),
          radial-gradient(circle at 14% 78%, rgba(255, 214, 128, 0.2), transparent 30%),
          linear-gradient(145deg, #3145a8 0%, #26347f 58%, #171f4c 100%);
      }

      .auth-scene::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.35) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.35) 1px, transparent 1px);
        background-size: 22px 22px;
      }

      .auth-scene-copy,
      .auth-stage,
      .auth-scene-foot {
        position: relative;
        z-index: 1;
      }

      .auth-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        font-weight: 850;
        letter-spacing: 0;
      }

      .auth-brand img {
        width: 42px;
        height: 42px;
        padding: 6px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
      }

      .auth-scene-copy h2.ant-typography {
        max-width: 560px;
        margin: 0;
        color: #ffffff;
        font-size: clamp(32px, 3.2vw, 50px);
        line-height: 1.08;
      }

      .auth-scene-copy .ant-typography {
        max-width: 560px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 17px;
        line-height: 1.8;
      }

      .auth-stage {
        position: relative;
        display: grid;
        place-items: end center;
        height: 430px;
        margin: 8px 0 14px;
      }

      .character-floor {
        position: absolute;
        left: 8%;
        right: 8%;
        bottom: 12px;
        height: 50px;
        border-radius: 999px;
        background: radial-gradient(ellipse, rgba(3, 12, 42, 0.42), transparent 68%);
        filter: blur(3px);
      }

      .ref-characters {
        position: relative;
        width: min(560px, 100%);
        height: 400px;
        transform: translateY(4px);
      }

      .ref-character {
        position: absolute;
        bottom: 0;
        transition:
          height 680ms cubic-bezier(0.2, 0.8, 0.2, 1),
          left 680ms cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 680ms cubic-bezier(0.2, 0.8, 0.2, 1);
        transform-origin: bottom center;
        box-shadow: 0 24px 42px rgba(0, 0, 0, 0.18);
      }

      .ref-character.purple {
        left: 70px;
        z-index: 1;
        width: 180px;
        height: 400px;
        border-radius: 10px 10px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.12), transparent 24%),
          #6c3ff5;
        transform: skewX(var(--purple-skew, 0deg));
      }

      .ref-character.black {
        left: 240px;
        z-index: 2;
        width: 120px;
        height: 310px;
        border-radius: 8px 8px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.06), transparent 24%),
          #2d2d2d;
        transform: skewX(var(--black-skew, 0deg));
      }

      .ref-character.orange {
        left: 0;
        z-index: 3;
        width: 240px;
        height: 200px;
        border-radius: 120px 120px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.18), transparent 30%),
          #ff9b6b;
        transform: skewX(var(--orange-skew, 0deg));
      }

      .ref-character.yellow {
        left: 310px;
        z-index: 4;
        width: 140px;
        height: 230px;
        border-radius: 70px 70px 0 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.22), transparent 30%),
          #e8d754;
        transform: skewX(var(--yellow-skew, 0deg));
      }

      .auth-shell.is-typing .ref-character.purple,
      .auth-shell.is-password:not(.show-password) .ref-character.purple {
        left: 110px;
        height: 440px;
        transform: skewX(calc(var(--purple-skew, 0deg) - 12deg)) translateX(34px);
      }

      .auth-shell.is-typing .ref-character.black,
      .auth-shell.is-password:not(.show-password) .ref-character.black {
        transform: skewX(calc(var(--black-skew, 0deg) + 8deg)) translateX(18px);
      }

      .auth-shell.show-password .ref-character.purple,
      .auth-shell.show-password .ref-character.black,
      .auth-shell.show-password .ref-character.orange,
      .auth-shell.show-password .ref-character.yellow {
        transform: skewX(0deg);
      }

      .ref-eyes {
        position: absolute;
        display: flex;
        transition:
          top 680ms cubic-bezier(0.2, 0.8, 0.2, 1),
          left 680ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .ref-character.purple .ref-eyes {
        left: calc(45px + var(--face-x, 0px));
        top: calc(40px + var(--face-y, 0px));
        gap: 28px;
      }

      .ref-character.black .ref-eyes {
        left: calc(26px + var(--face-x, 0px));
        top: calc(32px + var(--face-y, 0px));
        gap: 24px;
      }

      .ref-character.orange .ref-eyes {
        left: calc(82px + var(--face-x, 0px));
        top: calc(90px + var(--face-y, 0px));
        gap: 42px;
      }

      .ref-character.yellow .ref-eyes {
        left: calc(52px + var(--face-x, 0px));
        top: calc(40px + var(--face-y, 0px));
        gap: 36px;
      }

      .auth-shell.is-typing .ref-character.purple .ref-eyes {
        left: 55px;
        top: 65px;
      }

      .auth-shell.is-typing .ref-character.black .ref-eyes {
        left: 32px;
        top: 12px;
      }

      .auth-shell.show-password .ref-character.purple .ref-eyes {
        left: 20px;
        top: 35px;
      }

      .auth-shell.show-password .ref-character.black .ref-eyes {
        left: 10px;
        top: 28px;
      }

      .auth-shell.show-password .ref-character.orange .ref-eyes {
        left: 50px;
        top: 85px;
      }

      .auth-shell.show-password .ref-character.yellow .ref-eyes {
        left: 20px;
        top: 35px;
      }

      .ref-eye {
        position: relative;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #ffffff;
        overflow: hidden;
        transition: height 140ms ease;
      }

      .ref-eye.lg {
        width: 18px;
        height: 18px;
      }

      .ref-eye.md {
        width: 16px;
        height: 16px;
      }

      .ref-eye.dot-eye {
        width: 12px;
        height: 12px;
        background: transparent;
        overflow: visible;
      }

      .ref-pupil {
        display: block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #2d2d2d;
        transform: translate(var(--pupil-x, 0px), var(--pupil-y, 0px));
        transition: transform 120ms ease;
      }

      .ref-pupil.dot {
        width: 12px;
        height: 12px;
      }

      .auth-shell.is-typing .ref-character.purple .ref-pupil {
        transform: translate(3px, 4px);
      }

      .auth-shell.is-typing .ref-character.black .ref-pupil {
        transform: translate(0, -4px);
      }

      .auth-shell.show-password .ref-character.purple .ref-pupil {
        animation: peekLook 1.4s ease-in-out infinite;
      }

      .auth-shell.show-password .ref-character.black .ref-pupil,
      .auth-shell.show-password .ref-character.orange .ref-pupil,
      .auth-shell.show-password .ref-character.yellow .ref-pupil {
        transform: translate(-5px, -4px);
      }

      .yellow-mouth {
        position: absolute;
        left: calc(40px + var(--face-x, 0px));
        top: calc(88px + var(--face-y, 0px));
        width: 80px;
        height: 4px;
        border-radius: 999px;
        background: #2d2d2d;
        transition: left 200ms ease, top 200ms ease;
      }

      .auth-shell.show-password .yellow-mouth {
        left: 10px;
        top: 88px;
      }

      .password-cover {
        position: absolute;
        z-index: 8;
        border-radius: 22px;
        opacity: 0;
        transform: translateY(112px) rotate(0deg);
        transition: transform 360ms ease, opacity 240ms ease;
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.24);
      }

      .password-cover.left {
        left: 23px;
        top: 31px;
        width: 64px;
        height: 48px;
        background: #ff9b6b;
        transform-origin: right bottom;
      }

      .password-cover.right {
        left: 86px;
        top: 31px;
        width: 64px;
        height: 48px;
        background: #e8d754;
        transform-origin: left bottom;
      }

      .auth-shell.is-password:not(.show-password) .password-cover.left {
        opacity: 1;
        transform: translateY(0) rotate(10deg);
      }

      .auth-shell.is-password:not(.show-password) .password-cover.right {
        opacity: 1;
        transform: translateY(0) rotate(-10deg);
      }

      .auth-shell.show-password .password-cover.left {
        opacity: 0.82;
        transform: translate(-36px, 28px) rotate(24deg);
      }

      .auth-shell.show-password .password-cover.right {
        opacity: 0.82;
        transform: translate(36px, 28px) rotate(-24deg);
      }

      @keyframes peekLook {
        0%,
        100% {
          transform: translate(-4px, -4px);
        }
        50% {
          transform: translate(4px, 5px);
        }
      }

      .auth-badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: rgba(255, 255, 255, 0.76);
      }

      .auth-badge-row span {
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
      }

      .auth-form-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 34px;
        background:
          radial-gradient(circle at 70% 10%, rgba(108, 63, 245, 0.08), transparent 30%),
          rgba(255, 255, 255, 0.76);
        backdrop-filter: blur(14px);
      }

      .auth-card,
      .history-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.08);
      }

      .mobile-only {
        display: none;
      }

      .desktop-only {
        display: block;
      }

      .mobile-card-list {
        display: grid;
        gap: 12px;
      }

      .mobile-report-card,
      .mobile-calendar-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 26px rgba(24, 52, 126, 0.07);
      }

      .mobile-card-head {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .mobile-card-title {
        min-width: 0;
        color: #1f3f95;
        font-weight: 850;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .mobile-meta-grid {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .mobile-meta-item {
        display: grid;
        gap: 3px;
      }

      .mobile-meta-label {
        color: #64748b;
        font-size: 12px;
        font-weight: 750;
      }

      .mobile-meta-value {
        color: #27364a;
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .mobile-action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .mobile-action-grid .ant-btn {
        width: 100%;
        min-height: 38px;
        padding-inline: 8px;
        white-space: normal;
        line-height: 1.25;
      }

      .report-action-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .auth-card {
        width: min(460px, 100%);
        max-width: 460px;
        padding: 10px;
        border-radius: 24px;
      }

      .qr-modal-content {
        display: grid;
        gap: 14px;
        justify-items: center;
        padding-top: 8px;
      }

      .qr-modal-image {
        width: min(220px, 72vw);
        aspect-ratio: 1;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 14px 30px rgba(24, 52, 126, 0.12);
      }

      .qr-modal-link {
        max-width: 100%;
        margin: 0 !important;
        color: #526071;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .auth-page-actions {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 18px;
      }

      .auth-card .ant-input,
      .auth-card .ant-input-password,
      .auth-card .ant-input-affix-wrapper {
        border-radius: 999px;
      }

      .auth-card .ant-form-item {
        margin-bottom: 16px;
      }

      .auth-primary-button {
        min-width: 148px;
        height: 44px;
        border-radius: 999px;
        font-weight: 850;
        box-shadow: 0 14px 28px rgba(42, 75, 255, 0.18);
      }

      @media (max-width: 960px) {
        .auth-shell {
          grid-template-columns: 1fr;
        }

        .auth-scene {
          min-height: 380px;
        }
      }

      .gate-card {
        border: 1px solid rgba(42, 75, 255, 0.18);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(240, 244, 255, 0.9));
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.08);
      }

      .main-tabs > .ant-tabs-nav {
        margin-bottom: 18px;
        padding: 8px;
        border: 1px solid rgba(42, 75, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        box-shadow: 0 12px 30px rgba(24, 52, 126, 0.06);
      }

      .main-tabs .ant-tabs-tab {
        border-radius: 8px;
        background: transparent;
        padding: 14px 22px;
        font-size: 19px;
        font-weight: 800;
        line-height: 1.2;
      }

      .main-tabs .ant-tabs-tab + .ant-tabs-tab {
        margin-left: 12px;
      }

      .main-tabs .ant-tabs-tab-active {
        background: linear-gradient(135deg, #eef2ff, #ffffff);
        box-shadow: 0 8px 18px rgba(42, 75, 255, 0.12);
      }

      .main-tabs .ant-tabs-tab-btn {
        min-width: 82px;
        text-align: center;
      }

      .home-shell,
      .calendar-shell {
        animation: pageIn 320ms ease both;
      }

      .hero-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.72fr);
        gap: 28px;
        min-height: 470px;
        padding: 42px;
        overflow: hidden;
        border: 1px solid rgba(42, 75, 255, 0.18);
        border-radius: 8px;
        background:
          radial-gradient(circle at 92% 18%, rgba(42, 75, 255, 0.18), transparent 28%),
          radial-gradient(circle at 12% 76%, rgba(255, 122, 61, 0.12), transparent 30%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(241, 244, 255, 0.92) 58%, rgba(235, 239, 255, 0.9) 100%);
        box-shadow: 0 22px 56px rgba(24, 52, 126, 0.1);
      }

      .hero-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .hero-copy h1.ant-typography {
        max-width: 820px;
        margin: 0;
        color: #1f3f95;
        font-size: clamp(30px, 4.1vw, 54px);
        line-height: 1.12;
      }

      .hero-lede.ant-typography {
        max-width: 820px;
        margin: 22px 0 26px;
        color: #46554b;
        font-size: 18px;
        line-height: 1.85;
      }

      .hero-board {
        align-self: center;
        padding: 20px;
        border: 1px solid rgba(42, 75, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78), 0 20px 46px rgba(24, 52, 126, 0.09);
        backdrop-filter: blur(12px);
      }

      .board-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .hero-board .ant-statistic {
        min-height: 112px;
        padding: 16px;
        border-radius: 8px;
        background: linear-gradient(180deg, #fbfcff, #f0f3ff);
      }

      .stakeholder-row {
        margin-top: 16px;
      }

      .stakeholder-card,
      .section-card,
      .table-card,
      .summary-row .ant-card {
        border: 1px solid rgba(42, 75, 255, 0.14);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 36px rgba(24, 52, 126, 0.07);
      }

      .stakeholder-card {
        height: 100%;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .stakeholder-card:hover,
      .module-card:hover,
      .play-card:hover {
        border-color: rgba(42, 75, 255, 0.26);
        box-shadow: 0 18px 42px rgba(24, 52, 126, 0.1);
        transform: translateY(-2px);
      }

      .card-icon,
      .module-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        color: #1f3f95;
        background: linear-gradient(135deg, #eef2ff, #fff7f1);
        font-size: 18px;
        font-weight: 900;
      }

      .section-card {
        margin-top: 16px;
      }

      .section-title-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .section-title-row .ant-typography {
        max-width: 560px;
        margin: 4px 0 0;
        color: #657066;
        text-align: right;
      }

      .tall-card {
        height: 100%;
      }

      .module-card {
        height: 100%;
        border-color: rgba(42, 75, 255, 0.14);

    <script>
      const {

      function formatChineseDate(date) {
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      }

      function getDynamicDates() {
        const today = new Date();
        const endDate = new Date(today.getFullYear() + 1, today.getMonth(), today.getDate());
        endDate.setDate(endDate.getDate() - 1);
        return {
          todayText: formatChineseDate(today),
          rangeText: `${formatChineseDate(today)} - ${formatChineseDate(endDate)}`,
        };
      }

      const materials = {
        payment: [
          { label: "斗拱平台综合支付服务协议", href: "协议文件/02%20斗拱平台综合支付服务协议（四季蝉）20260113.docx" },
          { label: "药店与店员激励协议", href: "协议文件/03%20药店与店员激励协议.doc" },

          { label: "员工账号批量更新模板", href: "协议文件/员工账号批量更新模板.xlsx" },
        ],
        industry: [
          { label: "四季蝉厂家&品种政策收集表", href: "协议文件/四季蝉厂家%26品种政策收集表.xlsx" },
        ],

        if (!items || !items.length) return h(Text, { type: "secondary" }, "暂无");
        return h(
          Space,
          { direction: "vertical", size: 8, className: "download-list" },
          items.map((item) =>
            h(
              Button,
              { block: true, download: true, href: item.href, key: item.href },
              `下载：${item.label}`,
            ),
          ),
        );
      }

      function MobileMetaItem({ label, children }) {
        return h(
          "div",
          { className: "mobile-meta-item" },
          h("div", { className: "mobile-meta-label" }, label),
          h("div", { className: "mobile-meta-value" }, children),
        );
      }

      function ReportActionButtons({ row, compact = false }) {
        const item = normalizeReportArtifact(row);
        const gridClass = compact ? "mobile-action-grid" : "";
        return h(
          "div",
          { className: compact ? gridClass : "report-action-inline" },
          h(Button, { href: item.shareUrl, target: "_blank", type: compact ? "primary" : "default" }, "打开分享页"),
          h(Button, { onClick: () => showQrModal(item) }, "二维码"),
          h(Button, { href: item.svgUrl, target: "_blank" }, "下载SVG"),
          item.excelUrl ? h(Button, { href: item.excelUrl, target: "_blank" }, "Excel汇总") : null,
          item.diagnosticsUrl ? h(Button, { href: item.diagnosticsUrl, target: "_blank" }, "接口诊断") : null,
          item.normalizedDataUrl ? h(Button, { href: item.normalizedDataUrl, target: "_blank" }, "标准化数据") : null,
          h(Button, { onClick: () => copyText(item.shareUrl).then(() => message.success("分享链接已复制")) }, "复制链接"),
        );
      }

      async function readApiJson(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "请求处理失败。");
        return data;
      }

      async function apiJson(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: {
            ...(options.body instanceof FormData ? {} : { "Content-Type": "application/json" }),
            ...(options.headers || {}),
          },
        });
        return readApiJson(response);
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      function toCurrentOriginUrl(value) {
        if (!value) return "";
        try {
          const url = new URL(String(value), window.location.origin);
          if (!url.pathname.startsWith("/reports/")) return String(value);
          return `${window.location.origin}${url.pathname}${url.search}${url.hash}`;
        } catch {
          return String(value);
        }
      }

        const base = toCurrentOriginUrl(shareUrl);

        const shareUrl = toCurrentOriginUrl(artifact.shareUrl || artifact.share_url);

          svgUrl: toCurrentOriginUrl(artifact.svgUrl || artifact.svg_url || reportFileUrl(shareUrl, "report.svg")),
          qrSvgUrl: toCurrentOriginUrl(artifact.qrSvgUrl || artifact.qr_svg_url || reportFileUrl(shareUrl, "qr.svg")),

      function AIReviewWorkspace({ auth }) {
        const [sourceType, setSourceType] = React.useState("excel");
        const [sourceForm] = Form.useForm();
        const [status, setStatus] = React.useState(null);
        const [file, setFile] = React.useState(null);
        const [loading, setLoading] = React.useState(false);
        const [error, setError] = React.useState("");
        const [summary, setSummary] = React.useState(null);
        const [report, setReport] = React.useState(null);
        const [markdown, setMarkdown] = React.useState("");
        const [artifact, setArtifact] = React.useState(null);
        const [reviewProgress, setReviewProgress] = React.useState(null);
        const progressTimersRef = React.useRef([]);

        const loadStatus = React.useCallback(async () => {
          const response = await fetch("/api/ai-config/status");
          setStatus(await response.json());
        }, []);

        React.useEffect(() => {
          loadStatus().catch(() => setStatus({ configured: false }));
        }, [loadStatus]);

        React.useEffect(() => () => {
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          progressTimersRef.current = [];
        }, []);

        const resetReport = () => {
          setError("");
          setReport(null);
          setMarkdown("");
          setSummary(null);
          setArtifact(null);
          setReviewProgress(null);
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          progressTimersRef.current = [];
        };

        const startReviewProgress = (type) => {
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          const steps =
            type === "excel"
              ? [
                  { title: "校验模板", description: "正在检查Excel文件格式与模板结构。" },
                  { title: "上传数据", description: "正在安全上传客户复盘数据。" },
                  { title: "AI分析", description: "正在识别品种增长、奖励闭环和下期建议。" },
                  { title: "生成报告", description: "正在生成分享网页、SVG长图和二维码。" },
                ]
              : [
                  { title: "登录中", description: "正在登录四季蝉后台并获取授权。" },
                  { title: "读取销售数据", description: "正在读取销售汇总、上月对比和半年对比数据。" },
                  { title: "读取奖励活动", description: "正在读取奖励统计、活动汇总和概览校验数据。" },
                  { title: "读取培训打赏", description: "正在读取培训情况和厂家打赏数据。" },
                  { title: "生成报告", description: "正在生成AI报告、Excel汇总、分享网页、SVG长图和二维码。" },
                ];
          setReviewProgress({ steps, current: 0, status: "process", text: steps[0].description });
          [
            [700, 1],
            [2200, 2],
            [5200, 3],
            [7600, 4],
          ].forEach(([delay, current]) => {
            const timer = setTimeout(() => {
              setReviewProgress((prev) => {
                if (!prev || prev.status !== "process") return prev;
                return { ...prev, current, text: prev.steps[current].description };
              });
            }, delay);
            progressTimersRef.current.push(timer);
          });
        };

        const finishReviewProgress = (ok, text) => {
          progressTimersRef.current.forEach((timer) => clearTimeout(timer));
          progressTimersRef.current = [];
          setReviewProgress((prev) => {
            if (!prev) return null;
            return {
              ...prev,
              current: ok ? prev.steps.length - 1 : Math.max(prev.current, 0),
              status: ok ? "finish" : "error",
              text: text || (ok ? "复盘报告已生成，可打开分享页或下载长图。" : "生成失败，请检查数据或稍后重试。"),
            };
          });
        };

        const generateReport = async () => {
          if (!file) {
            message.warning("请先上传xlsx文件");
            return;
          }
          if (!status?.configured) {
            message.warning("请先完成AI配置");
            return;
          }
          setLoading(true);
          setError("");
          setReport(null);
          setMarkdown("");
          setArtifact(null);
          startReviewProgress("excel");
          try {
            const formData = new FormData();
            formData.append("file", file);
            const response = await fetch("/api/review-report", { method: "POST", body: formData });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
              setSummary(data.summary || null);
              throw new Error(data.error || "复盘报告生成失败。");
            }
            setSummary(data.summary);
            setReport(data.report);
            setMarkdown(data.markdown || "");
            setArtifact({ reportId: data.reportId, shareUrl: data.shareUrl, svgUrl: data.svgUrl, qrSvgUrl: data.qrSvgUrl, excelUrl: data.excelUrl, normalizedDataUrl: data.normalizedDataUrl, diagnosticsUrl: data.diagnosticsUrl });
            finishReviewProgress(true);
            message.success("AI复盘报告已生成");
          } catch (err) {
            setError(err.message || "复盘报告生成失败。");
            finishReviewProgress(false, err.message || "复盘报告生成失败。");
          } finally {
            setLoading(false);
          }
        };

        const generateFromSijichan = async () => {
          if (!status?.configured) {
            message.warning("请先完成AI配置");
            return;
          }
          const values = await sourceForm.validateFields();
          setLoading(true);
          resetReport();
          startReviewProgress("sijichan");
          try {
            const response = await fetch("/api/sijichan-review-report", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(values),
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
              setSummary(data.summary || null);
              throw new Error(data.error || "接口数据导入失败。");
            }
            setSummary(data.summary);
            setReport(data.report);
            setMarkdown(data.markdown || "");
            setArtifact({ reportId: data.reportId, shareUrl: data.shareUrl, svgUrl: data.svgUrl, qrSvgUrl: data.qrSvgUrl, excelUrl: data.excelUrl, normalizedDataUrl: data.normalizedDataUrl, diagnosticsUrl: data.diagnosticsUrl });
            finishReviewProgress(true);
            message.success("接口数据复盘报告已生成");
          } catch (err) {
            setError(err.message || "接口数据导入失败。");
            finishReviewProgress(false, err.message || "接口数据导入失败。");
          } finally {
            setLoading(false);
          }
        };

        return h(
          "div",
          { className: "ai-shell" },
          h(
            "div",
            { className: "ai-grid" },
            h(
              Card,
              { bordered: false, className: "ai-card" },
              h(Tag, { color: "blue", className: "hero-platform-tag" }, "AI复盘报告"),
              h(Title, { level: 2, className: "june-title" }, "上传客户数据，生成四季蝉复盘报告"),
              h(Paragraph, null, "支持Excel模板上传，也支持通过登录获取客户复盘数据。系统会读取销售变化、活动商品、店员提现、激励玩法、晒单打赏等明细，再由AI生成品种动销复盘。"),
              h(Alert, {
                type: status?.configured ? "success" : "warning",

      function AIConfigWorkspace({ auth }) {
        const [form] = Form.useForm();
        const [status, setStatus] = React.useState(null);
        const [saving, setSaving] = React.useState(false);
        const [testing, setTesting] = React.useState(false);

        const loadStatus = React.useCallback(async () => {
          const response = await fetch("/api/ai-config/status");
          const data = await response.json();
          setStatus(data);
          form.setFieldsValue({
            baseUrl: data.baseUrl || "https://api.deepseek.com",
            model: data.model || "deepseek-v4-flash",
            protocol: data.protocol || "chat_completions",
          });
        }, [form]);

        React.useEffect(() => {
          loadStatus().catch(() => setStatus({ configured: false }));
        }, [loadStatus]);

        const saveConfig = async () => {
          const values = await form.validateFields();
          setSaving(true);
          try {
            const response = await fetch("/api/ai-config", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(values),
            });
            const data = await readApiJson(response);
            setStatus(data.status);
            form.setFieldsValue({ apiKey: "", newAdminPassword: "" });
            message.success("AI配置已保存");
          } catch (err) {
            message.error(err.message || "保存失败");
          } finally {
            setSaving(false);
          }
        };

        const testConfig = async () => {
          const values = await form.validateFields();
          setTesting(true);
          try {
            const response = await fetch("/api/ai-config/test", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(values),
            });
            const data = await readApiJson(response);
            message.success(data.message || "连接成功");
          } catch (err) {
            message.error(err.message || "连接失败");
          } finally {
            setTesting(false);
          }
        };

        return h(
          "div",
          { className: "ai-shell" },
          h(
            "div",
            { className: "ai-grid" },
            h(
              Card,
              { bordered: false, className: "ai-card" },
              h(Tag, { color: "blue", className: "hero-platform-tag" }, "AI配置"),
              h(Title, { level: 2, className: "june-title" }, "配置AI接口和模型"),

                type: status?.configured ? "success" : "warning",

                message: status?.configured ? "AI接口已配置" : "尚未完成AI接口配置",
                description: status?.configured ? `当前模型：${status.model}；接口：${status.baseUrl}；协议：${status.protocol}` : "首次保存时，输入的管理密码会成为后续管理密码。",
              }),
              h(Divider, null),
              h(
                Form,
                { form, layout: "vertical" },
                h(
                  Form.Item,
                  { label: "AI API Key", name: "apiKey" },
                  h(Input.Password, { placeholder: status?.hasApiKey ? "已保存，留空则继续沿用" : "请输入 DeepSeek 或 OpenAI-compatible API Key" }),
                ),
                h(

                  { label: "Base URL", name: "baseUrl", rules: [{ required: true, message: "请输入Base URL" }] },

                h(

            ),
            h(
              Row,
              { gutter: [12, 12] },
              positionMappings.map(([product, method]) =>
                h(
                  Col,
                  { xs: 24, md: 12, xl: 8, key: product },
                  h(Card, { className: "position-card", bordered: false }, h("strong", null, product), h(Tag, { color: "cyan", className: "work-tag" }, method)),
                ),
              ),
            ),
          ),
          h(
            Card,
            { className: "section-card incentive-table", bordered: false },
            h(Title, { level: 2 }, "玩法明细表"),
            h(Table, { columns, dataSource: flatRows, pagination: false, scroll: { x: 1080 } }),
          ),
        );
      }

      function CalendarPage({ dates }) {
        const rows = [
          {
            key: 1,
            index: 1,
            project: "汇付账户开通",
            property: "一次性",
            propertyColor: "gold",
            content: "填写两份协议，用于申请开通汇付账户。",
            tasks: ["《汇付-斗拱平台综合支付协议》", "《药店与店员激励协议》"],
            notes: h(
              "div",
              { className: "notes-block" },
              h(Text, { strong: true }, "斗拱平台协议："),
              h("ul", null, h("li", null, "02斗拱平台协议：打印两份。"), h("li", null, `第三页合同日期：${dates.rangeText}。`), h("li", null, `盖章、签字，日期手写为${dates.todayText}。`), h("li", null, "额外侧面加盖骑缝章，最后扫描成A4大小的PDF文件。")),
              h(Text, { strong: true }, "药店与店员激励协议："),
              h("ul", null, h("li", null, "03药店与店员激励协议：打印一份。"), h("li", null, `签字、盖章，乙方按手印，日期手写为${dates.todayText}。`), h("li", null, "最后扫描成A4大小的PDF文件。")),
              h(Paragraph, null, "按文档说明操作。法人和联系人身份证可以直接上传身份证原件；如使用复印件，需要盖公章。"),
            ),
            materialItems: materials.payment,
            people: ["财务", "信息"],
          },
          { key: 2, index: 2, project: "基础信息维护", property: "一次性", propertyColor: "gold", content: "维护员工信息、门店信息。", tasks: ["Excel表格维护至新零售后台。"], notes: "暂无", materialItems: materials.baseInfo, people: ["信息"] },
          { key: 3, index: 3, project: "工业信息收集", property: "及时更新", propertyColor: "cyan", content: "收集厂家信息，开通厂家账号，用于充值及建活动。", tasks: ["按模板填写《四季蝉供应商信息收集表》。"], notes: "暂无", materialItems: materials.industry, people: ["运营", "采购"] },
          { key: 4, index: 4, project: "活动商品创建", property: "每月更新", propertyColor: "cyan", content: "确认活动品种和活动政策。", tasks: ["按模板填写《品种政策收集模板表》。"], notes: "暂无", materialItems: [], people: ["运营", "采购"] },
          { key: 5, index: 5, project: "操作培训", property: "一次性", propertyColor: "gold", content: "连锁培训。", tasks: ["参与在线会议。"], notes: "暂无", materialItems: [], people: ["运营", "采购", "财务", "信息"] },
          { key: 6, index: 6, project: "订单测试", property: "一次性", propertyColor: "gold", content: "完成正向、逆向订单的奖励生成收回测试。", tasks: ["零售测试。"], notes: "暂无", materialItems: [], people: ["信息"] },
          { key: 7, index: 7, project: "店员培训上线", property: "一次性", propertyColor: "gold", content: "员工手机端培训：登录、认证；如何确认销售与奖励获得情况。", tasks: ["发送视频操作说明，可给店员集中线上培训。"], notes: "暂无", materialItems: [], people: ["店员"] },
        ];

        const columns = [
          { title: "序号", dataIndex: "index", width: 64, fixed: "left", align: "center", render: (value) => h(Text, { strong: true }, value) },
          { title: "项目", dataIndex: "project", width: 140, fixed: "left", render: (value) => h(Text, { strong: true, className: "project-name" }, value) },
          { title: "工作属性", dataIndex: "property", width: 112, render: (value, row) => h(Tag, { color: row.propertyColor, className: "work-tag" }, value) },
          { title: "对接内容", dataIndex: "content", width: 190 },
          {
            title: "处理事务",
            dataIndex: "tasks",
            width: 180,
            render: (tasks) => h(Space, { direction: "vertical", size: 8 }, tasks.map((task) => h(Tag, { className: "task-tag", key: task }, task))),
          },
          { title: "注意事项", dataIndex: "notes", width: 360, render: (notes) => (notes === "暂无" ? h(Text, { type: "secondary" }, "暂无") : notes) },
          { title: "材料下载", dataIndex: "materialItems", width: 230, render: (items) => h(MaterialButtons, { items }) },
          {
            title: "连锁配合人员（建议）",
            dataIndex: "people",
            width: 180,
            render: (people) => h(Space, { wrap: true, size: [6, 6] }, people.map((person) => h(Tag, { color: "blue", className: "people-tag", key: person }, person))),
          },
        ];

        const mobileCalendar = h(
          "div",
          { className: "mobile-only mobile-card-list" },
          rows.map((row) =>
            h(
              Card,
              { key: row.key, bordered: false, className: "mobile-calendar-card" },
              h(
                "div",
                { className: "mobile-card-head" },
                h("div", { className: "mobile-card-title" }, `${row.index}. ${row.project}`),
                h(Tag, { color: row.propertyColor, className: "work-tag" }, row.property),
              ),
              h(
                "div",
                { className: "mobile-meta-grid" },
                h(MobileMetaItem, { label: "对接内容" }, row.content),
                h(MobileMetaItem, { label: "处理事务" }, h(Space, { direction: "vertical", size: 6 }, row.tasks.map((task) => h(Tag, { className: "task-tag", key: task }, task)))),
                h(MobileMetaItem, { label: "注意事项" }, row.notes === "暂无" ? h(Text, { type: "secondary" }, "暂无") : row.notes),
                h(MobileMetaItem, { label: "材料下载" }, h(MaterialButtons, { items: row.materialItems })),
                h(MobileMetaItem, { label: "连锁配合人员" }, h(Space, { wrap: true, size: [6, 6] }, row.people.map((person) => h(Tag, { color: "blue", className: "people-tag", key: person }, person)))),
              ),
            ),
          ),
        );

        return h(
          "div",
          { className: "calendar-shell" },
          h(Alert, { showIcon: true, type: "success", message: "对接行事历", description: "海典指导，连锁配合。材料下载列中的文件可直接提供给客户使用。" }),
          h(
            Row,
            { gutter: [16, 16], className: "summary-row" },
            [["总事项", 7], ["一次性工作", 5], ["每月更新", 1], ["及时更新", 1]].map(([title, value]) => h(Col, { xs: 12, md: 6, key: title }, h(Card, { bordered: false }, h(Statistic, { title, value })))),
          ),
          h(Card, { bordered: false, className: "table-card desktop-only" }, h(Table, { columns, dataSource: rows, pagination: false, scroll: { x: 1500 }, sticky: true })),
          mobileCalendar,
        );
      }

      function App() {
        const [activeKey, setActiveKey] = React.useState("home");
        const [auth, setAuth] = React.useState({ user: null, profile: null, loading: true });
        const initialAuthPage = new URLSearchParams(window.location.search).get("page");
        const [authPage, setAuthPage] = React.useState(initialAuthPage === "register" ? "register" : initialAuthPage === "login" ? "login" : "");
        const dates = React.useMemo(getDynamicDates, []);
        const loadMe = React.useCallback(async () => {
          try {
            const data = await apiJson("/api/auth/me");
            setAuth({ user: data.user || null, profile: data.profile || null, database: data.database, loading: false });
          } catch {
            setAuth({ user: null, profile: null, loading: false });
          }
        }, []);
        React.useEffect(() => {
          loadMe();
        }, [loadMe]);

        const onAuthed = (data) => {
          setAuth({ user: data.user || null, profile: data.profile || null, loading: false });
          setAuthPage("");
          window.history.replaceState(null, "", `${window.location.pathname}?v=auth-portal`);
          setActiveKey("aiReview");
        };
        const logout = async () => {
          await apiJson("/api/auth/logout", { method: "POST", body: "{}" }).catch(() => null);
          setAuth({ user: null, profile: null, loading: false });
          setAuthPage("");
          window.history.replaceState(null, "", `${window.location.pathname}?v=auth-portal`);
          setActiveKey("home");
          message.success("已退出登录");
        };
        const openAuthPage = (mode) => {
          setAuthPage(mode);
          window.history.pushState(null, "", `${window.location.pathname}?page=${mode}`);
        };
        const openLogin = () => openAuthPage("login");
        const openRegister = () => openAuthPage("register");
        const authProps = { auth, onLogin: openLogin, onRegister: openRegister };
        const tabItems = [
          { key: "home", label: "首页", children: h(HomePage, { onOpenCalendar: () => setActiveKey("calendar") }) },
          { key: "calendar", label: "对接行事历", children: h(CalendarPage, { dates }) },
          { key: "incentive", label: "激励玩法", children: h(IncentivePage) },
          { key: "selection", label: "选品思路", children: h(SelectionPage) },
          { key: "june", label: "6月营销推荐", children: h(JuneMarketingPage) },
          { key: "aiReview", label: "AI复盘报告", children: h(AIReviewPage, authProps) },
          { key: "history", label: "历史报告", children: h(HistoryPage, authProps) },
          ...(auth.user?.role === "admin" ? [{ key: "aiConfig", label: "AI配置", children: h(AIConfigPage, authProps) }] : []),
        ];

        if (authPage && !auth.user) {
          return h(
            ConfigProvider,
            {
              theme: {
                token: {
                  colorPrimary: "#2a4bff",
                  borderRadius: 8,
                  colorInfo: "#2a4bff",
                  fontFamily: '"Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif',
                },
              },
            },
            h("main", { className: "auth-route-shell" }, h(AuthPage, { mode: authPage, onModeChange: openAuthPage, onAuthed })),
          );
        }

        return h(
          ConfigProvider,
          {
            theme: {
              token: {
                colorPrimary: "#2a4bff",
                borderRadius: 8,
                colorInfo: "#2a4bff",
                fontFamily: '"Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif',
              },
            },
          },
          h(
            "main",
            { className: "app-shell" },
            h(
              "header",
              { className: "app-header" },
              h(
                "div",
                { className: "brand-lockup" },
                h("img", { src: "assets/四季蝉.png", alt: "四季蝉logo", className: "brand-logo" }),
                h(
                  "div",
                  { className: "brand-copy" },
                  h(Text, { className: "brand-kicker" }, "It is like an all-season cicada; you can hear its song even in winter."),
                  h(Title, null, "海典四季蝉"),
                  h(Paragraph, null, "帮助连锁重点品动销加速的运营数字化解决方案"),
                ),
              ),
              h(
                "div",
                { className: "user-panel" },
                auth.user
                  ? [
                      h(Tag, { color: auth.user.role === "admin" ? "gold" : "blue", key: "role" }, auth.user.role === "admin" ? "管理员" : "客户"),
                      h(Text, { strong: true, key: "name" }, auth.user.name),
                      h(Button, { key: "history", onClick: () => setActiveKey("history") }, "历史报告"),
                      h(Button, { key: "logout", onClick: logout }, "退出登录"),
                    ]
                  : [
                      h(Button, { key: "login", onClick: openLogin }, "登录"),
                      h(Button, { key: "register", type: "primary", onClick: openRegister }, "注册"),
                    ],
              ),
            ),
            h(Tabs, {
              activeKey,
              className: "main-tabs",
              onChange: setActiveKey,
              items: tabItems,
            }),
          ),
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
